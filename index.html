<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BINET Sistema Completo Firebase</title>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;font-family:Arial,Helvetica,sans-serif;background:#0c0c0f;color:white;overflow:hidden}
button,input,textarea,select{font-family:inherit}
button{cursor:pointer}
:root{--bg:#0c0c0f;--p:#1a1a22;--p2:#22222e;--b:#2d2d3d;--t:#f1f1f8;--m:#a8a8c0;--m2:#66667e;--a:#6c63ff;--g:#22c55e;--r:#ef4444;--o:#f59e0b;--bl:#3b82f6}
.hidden{display:none!important}
#login{height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(circle at top,rgba(108,99,255,.25),transparent 45%),#0c0c0f}
.card{width:100%;max-width:390px;background:var(--p);border:1px solid var(--b);border-radius:28px;padding:30px;box-shadow:0 20px 70px rgba(0,0,0,.55)}
.logo{width:78px;height:78px;border-radius:26px;background:linear-gradient(135deg,var(--a),#4a42dd);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:36px;font-weight:900}
h1{text-align:center;margin:0;font-size:32px}.sub{text-align:center;color:var(--m2);font-size:14px;margin:8px 0 25px}
label{display:block;margin-top:14px;margin-bottom:7px;color:#b7b7ca;font-size:12px;font-weight:800;letter-spacing:.8px}
.card input{width:100%;padding:15px;border-radius:14px;border:1px solid #343448;background:#111119;color:white;outline:none;font-size:16px}
.primary{width:100%;margin-top:22px;padding:15px;border:0;border-radius:15px;background:linear-gradient(135deg,var(--a),#4a42dd);color:white;font-weight:900;font-size:16px}
#error{color:#ff6b6b;min-height:22px;font-size:13px;margin-top:10px;white-space:pre-wrap}.demo{margin-top:18px;border:1px dashed #33334a;border-radius:15px;padding:12px;color:#b7b7ca;font-size:13px;line-height:1.5}.demo strong{color:white}

#app{display:none;width:100%;height:100vh;background:var(--bg)}
.sidebar{width:270px;background:var(--p);border-right:1px solid var(--b);display:flex;flex-direction:column;flex-shrink:0}
.brand{height:76px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:12px;padding:0 16px}
.brandMark{width:42px;height:42px;border-radius:15px;background:linear-gradient(135deg,var(--a),#4a42dd);display:flex;align-items:center;justify-content:center;font-weight:900}
.brand h2{margin:0;font-size:18px}.brand span{display:block;color:var(--m2);font-size:11px;margin-top:2px}
.nav{padding:12px}.nav button{width:100%;padding:12px;border:1px solid transparent;border-radius:14px;background:transparent;color:var(--m);text-align:left;margin-bottom:5px;font-weight:800}
.nav button.active,.nav button:hover{background:var(--p2);border-color:var(--b);color:white}
.meBox{margin-top:auto;border-top:1px solid var(--b);padding:12px}
.meRow{display:flex;align-items:center;gap:10px;margin-bottom:10px}.avatar{width:40px;height:40px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:900;color:white}.meRow strong{font-size:13px}.meRow span{font-size:11px;color:var(--m2);display:block}
.logout{width:100%;padding:10px;border:0;border-radius:12px;background:#111119;color:white}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.top{height:76px;flex-shrink:0;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:#131318}
.top h2{margin:0;font-size:20px}.top p{margin:4px 0 0;color:var(--m2);font-size:12px}
.content{flex:1;min-height:0;overflow:hidden}

.chatLayout{height:100%;display:grid;grid-template-columns:320px 1fr}
.listPanel{border-right:1px solid var(--b);background:#131318;display:flex;flex-direction:column;min-height:0}.panelHead{padding:14px;border-bottom:1px solid var(--b)}
.search{width:100%;padding:11px;border-radius:12px;border:1px solid var(--b);background:#111119;color:white;outline:none}
.chatList{flex:1;overflow:auto;padding:10px}.chatItem{width:100%;display:flex;align-items:center;gap:10px;padding:10px;border:1px solid transparent;border-radius:14px;background:transparent;color:white;text-align:left;margin-bottom:4px}.chatItem:hover,.chatItem.active{background:var(--p2);border-color:var(--b)}
.chatItem small{display:block;color:var(--m2);margin-top:2px}
.chatArea{height:100%;min-width:0;display:flex;flex-direction:column}.chatHead{height:62px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:#131318}
#messages{flex:1;min-height:0;overflow:auto;padding:18px;display:flex;flex-direction:column;gap:10px}.msg{max-width:75%;padding:11px 13px;border-radius:16px;word-break:break-word}.mine{align-self:flex-end;background:linear-gradient(135deg,var(--a),#4a42dd);border-bottom-right-radius:5px}.other{align-self:flex-start;background:var(--p);border:1px solid var(--b);border-bottom-left-radius:5px}.system{align-self:center;background:rgba(108,99,255,.12);color:var(--m);border:1px solid rgba(108,99,255,.25);font-size:12px;max-width:90%}.msgHead{display:flex;justify-content:space-between;gap:20px;font-size:11px;opacity:.75;margin-bottom:5px}.composer{height:68px;display:flex;gap:10px;padding:11px;border-top:1px solid var(--b);background:var(--p)}.composer input{flex:1;min-width:0;border:1px solid #343448;background:#111119;color:white;border-radius:16px;padding:0 15px;outline:none}.composer button,.smallBtn{border:0;border-radius:14px;background:linear-gradient(135deg,var(--a),#4a42dd);color:white;font-weight:900;padding:0 16px}.typing{font-size:12px;color:var(--m2);padding:0 16px 5px;height:18px}

.grid{height:100%;overflow:auto;padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}.box{background:var(--p);border:1px solid var(--b);border-radius:18px;padding:16px}.box h3{margin:0 0 8px}.muted{color:var(--m2);font-size:12px}.pill{display:inline-block;padding:4px 8px;border-radius:999px;font-size:11px;font-weight:900}.green{background:rgba(34,197,94,.14);color:var(--g)}.orange{background:rgba(245,158,11,.14);color:var(--o)}.red{background:rgba(239,68,68,.14);color:var(--r)}.blue{background:rgba(59,130,246,.14);color:#60a5fa}
.formGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.formGrid input,.formGrid select,.formGrid textarea{width:100%;padding:11px;border-radius:12px;border:1px solid var(--b);background:#111119;color:white;outline:none}.formGrid textarea{grid-column:1/-1;min-height:80px;resize:vertical}.full{grid-column:1/-1}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.danger{background:rgba(239,68,68,.15)!important;color:#ff8a8a!important;border:1px solid rgba(239,68,68,.35)!important}.secondary{background:var(--p2)!important;border:1px solid var(--b)!important;color:white!important}.progress{height:8px;border-radius:999px;background:#111119;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,var(--a),#9b8cff)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50}.modalBox{width:100%;max-width:520px;max-height:90vh;overflow:auto;background:var(--p);border:1px solid var(--b);border-radius:22px;padding:18px}.modalHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.x{width:34px;height:34px;border-radius:12px;border:0;background:#111119;color:white}

@media(max-width:850px){#app{flex-direction:column}.sidebar{width:100%;height:auto}.brand{height:60px}.nav{display:flex;overflow:auto;padding:8px}.nav button{min-width:105px;text-align:center}.meBox{display:none}.chatLayout{grid-template-columns:1fr}.listPanel{display:none}.grid{grid-template-columns:1fr}.formGrid{grid-template-columns:1fr}}
</style>
</head>
<body>

<section id="login">
  <div class="card">
    <div class="logo">B</div><h1>BINET</h1><div class="sub">Sistema interno completo con Firebase</div>
    <label>USUARIO</label><input id="user" placeholder="rich o ariana">
    <label>CONTRASEÑA</label><input id="pass" type="password" placeholder="1234">
    <div id="error"></div><button id="loginBtn" class="primary">Ingresar</button>
    <div class="demo"><strong>Usuarios de prueba:</strong><br>Administrador: <strong>rich</strong> / clave <strong>1234</strong><br>Usuario: <strong>ariana</strong> / clave <strong>1234</strong></div>
  </div>
</section>

<section id="app">
  <aside class="sidebar">
    <div class="brand"><div class="brandMark">B</div><div><h2>BINET</h2><span>Comunicación interna</span></div></div>
    <div class="nav">
      <button data-tab="chats" class="active">💬 Mensajes</button>
      <button data-tab="tasks">✅ Tareas</button>
      <button data-tab="people">👥 Equipo</button>
      <button data-tab="announcements">📢 Anuncios</button>
      <button data-tab="profile">⚡ Perfil</button>
      <button data-tab="admin">⚙️ Admin</button>
    </div>
    <div class="meBox">
      <div class="meRow"><div id="myAvatar" class="avatar">R</div><div><strong id="myName">Usuario</strong><span id="myRole">rol</span></div></div>
      <button class="logout" id="logoutBtn">Cerrar sesión</button>
    </div>
  </aside>

  <main class="main">
    <header class="top"><div><h2 id="pageTitle">Mensajes</h2><p id="pageSub">Chat en vivo tipo WhatsApp / Slack</p></div><button id="notifBtn" class="smallBtn">🔔 0</button></header>
    <section id="content" class="content"></section>
  </main>
</section>

<div id="modal" class="modal hidden"><div class="modalBox"><div class="modalHead"><h3 id="modalTitle"></h3><button class="x" onclick="closeModal()">✕</button></div><div id="modalBody"></div></div></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB0HVVTUhkswLkLORXLIZwOCoSLKsKDpuC",
  authDomain: "binet-e3ac3.firebaseapp.com",
  databaseURL: "https://binet-e3ac3-default-rtdb.firebaseio.com",
  projectId: "binet-e3ac3",
  storageBucket: "binet-e3ac3.firebasestorage.app",
  messagingSenderId: "272460687857",
  appId: "1:272460687857:web:badaa5c917b5192203fc50"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let me=null, activeTab="chats", activeChat="general", activeChatName="General", msgListener=null, users={}, rooms={}, tasks={}, anns={}, levels={};
const defaultUsers={
 rich:{id:"rich",username:"rich",password:"1234",name:"Richard Urbina",role:"administrador",dept:"Dirección",avatar:"RU",color:"#6c63ff",online:false,xp:0,badges:["👑"]},
 ariana:{id:"ariana",username:"ariana",password:"1234",name:"Ariana",role:"usuario",dept:"Operaciones",avatar:"AR",color:"#22c55e",online:false,xp:0,badges:[]}
};
const defaultRooms={
 general:{id:"general",name:"General",icon:"💬",desc:"Canal general"},
 tecnologia:{id:"tecnologia",name:"Tecnología",icon:"💻",desc:"Sistemas y desarrollo"},
 ventas:{id:"ventas",name:"Ventas",icon:"💼",desc:"Clientes y ventas"}
};
const defaultLevels={
 l1:{l:1,name:"Pollito",xp:0,icon:"🐣"},
 l2:{l:2,name:"Mazos",xp:200,icon:"🪓"},
 l3:{l:3,name:"Hachas de Metal",xp:500,icon:"⚙️"},
 l4:{l:4,name:"Hachas de Plata",xp:900,icon:"⚔️"},
 l5:{l:5,name:"Hachas de Oro",xp:1400,icon:"🏆"},
 l6:{l:6,name:"Achones",xp:2000,icon:"🔥"},
 l7:{l:7,name:"Cetros",xp:2800,icon:"👑"},
 l8:{l:8,name:"Dragón Azul",xp:3800,icon:"🐲"}
};

function esc(v){return String(v||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")}
function time(ts){return new Date(ts||Date.now()).toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"})}
function date(ts){return new Date(ts||Date.now()).toLocaleDateString("es-CL")}
function uid(){return "id_"+Date.now()+"_"+Math.random().toString(36).slice(2,7)}
function err(m){document.getElementById("error").textContent=m}
function isAdmin(){return me && me.role==="administrador"}
function getLevel(xp){let arr=Object.values(levels).sort((a,b)=>a.xp-b.xp);let lv=arr[0]||defaultLevels.l1;arr.forEach(x=>{if((xp||0)>=x.xp)lv=x});return lv}
function nextLevel(xp){return Object.values(levels).sort((a,b)=>a.xp-b.xp).find(x=>x.xp>(xp||0))||null}
function beep(){try{let c=new (window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=660;g.gain.value=.05;o.start();setTimeout(()=>{o.stop();c.close()},120)}catch(e){}}

async function seed(){
 let s=await db.ref("users").get();let up={};let d=s.val()||{};Object.keys(defaultUsers).forEach(k=>{if(!d[k])up["users/"+k]=defaultUsers[k]});
 s=await db.ref("rooms").get();d=s.val()||{};Object.keys(defaultRooms).forEach(k=>{if(!d[k])up["rooms/"+k]=defaultRooms[k]});
 s=await db.ref("levels").get();d=s.val()||{};Object.keys(defaultLevels).forEach(k=>{if(!d[k])up["levels/"+k]=defaultLevels[k]});
 s=await db.ref("announcements").get();if(!s.exists())up["announcements/"+uid()]={id:uid(),title:"🎉 Bienvenido a BINET",text:"Sistema de comunicación interna conectado a Firebase.",from:"BINET Sistema",createdAt:Date.now(),pinned:true};
 if(Object.keys(up).length) await db.ref().update(up);
}

async function login(){
 err("");let u=document.getElementById("user").value.trim().toLowerCase(),p=document.getElementById("pass").value.trim();
 if(!u||!p)return err("Ingresa usuario y contraseña.");
 try{
  document.getElementById("loginBtn").textContent="Ingresando...";
  await seed();let snap=await db.ref("users/"+u).get();
  if(!snap.exists())return err("Usuario no existe.");
  let user=snap.val(); if(String(user.password)!==String(p))return err("Clave incorrecta.");
  me=user; await db.ref("users/"+me.id).update({online:true,lastSeen:Date.now()});
  db.ref("users/"+me.id+"/online").onDisconnect().set(false); db.ref("users/"+me.id+"/lastSeen").onDisconnect().set(Date.now());
  document.getElementById("login").style.display="none";document.getElementById("app").style.display="flex";
  document.getElementById("myName").textContent=me.name;document.getElementById("myRole").textContent=me.role;document.getElementById("myAvatar").textContent=me.avatar;document.getElementById("myAvatar").style.background=me.color;
  bindRealtime(); render();
 }catch(e){console.error(e);err("ERROR FIREBASE:\\n"+(e.message||e))}
 finally{document.getElementById("loginBtn").textContent="Ingresar"}
}
async function logout(){if(me)await db.ref("users/"+me.id).update({online:false,lastSeen:Date.now()});location.reload()}

function bindRealtime(){
 db.ref("users").on("value",s=>{users=s.val()||{};if(activeTab==="people"||activeTab==="admin"||activeTab==="chats")render()});
 db.ref("rooms").on("value",s=>{rooms=s.val()||{};if(activeTab==="chats"||activeTab==="admin")render()});
 db.ref("tasks").on("value",s=>{tasks=s.val()||{};updateNotif();if(activeTab==="tasks"||activeTab==="admin"||activeTab==="profile")render()});
 db.ref("announcements").on("value",s=>{anns=s.val()||{};if(activeTab==="announcements"||activeTab==="chats")render()});
 db.ref("levels").on("value",s=>{levels=s.val()||defaultLevels;if(activeTab==="profile"||activeTab==="admin")render()});
}
function updateNotif(){let n=Object.values(tasks).filter(t=>t.assignedTo===me?.id&&t.status!=="completada").length;document.getElementById("notifBtn").textContent="🔔 "+n}

document.querySelectorAll(".nav button").forEach(b=>b.onclick=()=>{document.querySelectorAll(".nav button").forEach(x=>x.classList.remove("active"));b.classList.add("active");activeTab=b.dataset.tab;render()});
document.getElementById("loginBtn").onclick=login;document.getElementById("logoutBtn").onclick=logout;document.getElementById("pass").onkeydown=e=>{if(e.key==="Enter")login()};document.getElementById("notifBtn").onclick=()=>{activeTab="tasks";document.querySelectorAll(".nav button").forEach(x=>x.classList.toggle("active",x.dataset.tab==="tasks"));render()};

function setTitle(t,s){document.getElementById("pageTitle").textContent=t;document.getElementById("pageSub").textContent=s}
function render(){if(!me)return; if(activeTab==="chats")renderChats(); if(activeTab==="tasks")renderTasks(); if(activeTab==="people")renderPeople(); if(activeTab==="announcements")renderAnnouncements(); if(activeTab==="profile")renderProfile(); if(activeTab==="admin")renderAdmin()}

function renderChats(){
 setTitle("Mensajes","Chat en vivo tipo WhatsApp / Slack");
 document.getElementById("content").innerHTML=`<div class="chatLayout"><div class="listPanel"><div class="panelHead"><input class="search" id="chatSearch" placeholder="Buscar..."></div><div class="chatList" id="chatList"></div></div><div class="chatArea"><div class="chatHead"><div><strong id="chatName"></strong><br><span class="muted" id="chatSub"></span></div><button class="smallBtn" onclick="openNewRoom()">+ Canal</button></div><div id="messages"></div><div id="typing" class="typing"></div><div class="composer"><input id="msgInput" placeholder="Escribe un mensaje..."><button onclick="sendMsg()">➤</button></div></div></div>`;
 renderChatList(); openChat(activeChat,activeChatName);
 document.getElementById("msgInput").onkeydown=e=>{if(e.key==="Enter")sendMsg()};
 document.getElementById("msgInput").oninput=()=>{db.ref("typing/"+activeChat+"/"+me.id).set({name:me.name,at:Date.now()});clearTimeout(window.typT);window.typT=setTimeout(()=>db.ref("typing/"+activeChat+"/"+me.id).remove(),900)}
}
function renderChatList(){
 let box=document.getElementById("chatList"); if(!box)return; box.innerHTML="";
 Object.values(rooms).forEach(r=>box.innerHTML+=`<button class="chatItem ${activeChat===r.id?'active':''}" onclick="openChat('${r.id}','${esc(r.name)}')"><div class="avatar" style="background:#6c63ff">${r.icon||"💬"}</div><div><strong>${esc(r.name)}</strong><small>${esc(r.desc||"Canal")}</small></div></button>`);
 Object.values(users).filter(u=>u.id!==me.id).forEach(u=>{let id=["dm",me.id,u.id].sort().join("_");box.innerHTML+=`<button class="chatItem ${activeChat===id?'active':''}" onclick="openChat('${id}','${esc(u.name)}')"><div class="avatar" style="background:${u.color}">${esc(u.avatar)}</div><div><strong>${esc(u.name)}</strong><small>${u.online?"🟢 En línea":"⚫ Desconectado"} · ${esc(u.role)}</small></div></button>`});
}
function openChat(id,name){activeChat=id;activeChatName=name;let cn=document.getElementById("chatName");if(!cn)return;cn.textContent=name;document.getElementById("chatSub").textContent=id.startsWith("dm_")?"Mensaje directo":"Canal grupal";document.getElementById("messages").innerHTML="";renderChatList(); if(msgListener)db.ref("messages/"+id).off("child_added",msgListener); msgListener=s=>{let m=s.val();addMsg(m)}; db.ref("messages/"+id).on("child_added",msgListener); db.ref("typing/"+id).on("value",s=>{let d=s.val()||{};let names=Object.entries(d).filter(([k])=>k!==me.id).map(([k,v])=>v.name);let t=document.getElementById("typing"); if(t)t.textContent=names.length?names.join(", ")+" está escribiendo...":""})}
function addMsg(m){let box=document.getElementById("messages");if(!box||!m)return;let mine=m.userId===me.id;let div=document.createElement("div");div.className=m.type==="system"?"msg system":"msg "+(mine?"mine":"other");div.innerHTML=m.type==="system"?esc(m.text):`<div class="msgHead"><strong>${esc(m.name)}</strong><span>${time(m.time)}</span></div><div>${esc(m.text)}</div>`;box.appendChild(div);box.scrollTop=box.scrollHeight;beep()}
async function sendMsg(){let i=document.getElementById("msgInput"),text=i.value.trim();if(!text)return;await db.ref("messages/"+activeChat).push({userId:me.id,name:me.name,text,time:Date.now()});i.value="";db.ref("typing/"+activeChat+"/"+me.id).remove()}

function renderTasks(){
 setTitle("Tareas","Gestión de tareas, estados, prioridades y XP");
 let arr=Object.values(tasks).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
 document.getElementById("content").innerHTML=`<div class="grid"><div class="box"><h3>Nueva tarea</h3><div class="formGrid"><input id="tTitle" placeholder="Título"><select id="tTo">${Object.values(users).map(u=>`<option value="${u.id}">${u.name}</option>`)}</select><select id="tPriority"><option>media</option><option>alta</option><option>urgente</option><option>baja</option></select><input id="tXp" type="number" value="50" placeholder="XP"><textarea id="tDesc" placeholder="Descripción"></textarea><button class="smallBtn full" onclick="createTask()">Crear tarea</button></div></div>${arr.map(taskCard).join("")}</div>`;
}
function taskCard(t){let cls=t.priority==="urgente"?"red":t.priority==="alta"?"orange":"blue";return `<div class="box"><div class="row"><h3 style="flex:1">${esc(t.title)}</h3><span class="pill ${cls}">${esc(t.priority)}</span></div><p class="muted">${esc(t.desc||"")}</p><p class="muted">Asignado a: ${esc(users[t.assignedTo]?.name||t.assignedTo)}<br>Por: ${esc(users[t.assignedBy]?.name||t.assignedBy)} · XP ${t.xp||0}</p><span class="pill ${t.status==='completada'?'green':'orange'}">${esc(t.status||"pendiente")}</span><div class="row" style="margin-top:12px"><button class="smallBtn secondary" onclick="setTask('${t.id}','en progreso')">En progreso</button><button class="smallBtn" onclick="completeTask('${t.id}')">Completar</button>${isAdmin()?`<button class="smallBtn danger" onclick="del('tasks/${t.id}')">Eliminar</button>`:""}</div></div>`}
async function createTask(){let id=uid();await db.ref("tasks/"+id).set({id,title:val("tTitle"),assignedTo:val("tTo"),assignedBy:me.id,priority:val("tPriority"),xp:+val("tXp")||0,desc:val("tDesc"),status:"pendiente",createdAt:Date.now()})}
function setTask(id,status){db.ref("tasks/"+id).update({status})}
async function completeTask(id){let t=tasks[id];await db.ref("tasks/"+id).update({status:"completada",completedAt:Date.now()});if(t&&t.assignedTo===me.id){let xp=(me.xp||0)+(t.xp||0);await db.ref("users/"+me.id).update({xp});me.xp=xp;let lv=getLevel(xp);await db.ref("announcements/"+uid()).set({id:uid(),title:"🏆 Tarea completada",text:`${me.name} completó una tarea y ganó ${t.xp||0} XP. Nivel actual: ${lv.icon} ${lv.name}`,from:"BINET Sistema",createdAt:Date.now()})}}

function renderPeople(){
 setTitle("Equipo","Usuarios, cargos, estado online y contacto");
 document.getElementById("content").innerHTML=`<div class="grid">${Object.values(users).map(u=>`<div class="box"><div class="row"><div class="avatar" style="background:${u.color}">${esc(u.avatar)}</div><div><h3>${esc(u.name)}</h3><p class="muted">@${esc(u.username)} · ${esc(u.dept||"")}</p></div></div><p><span class="pill ${u.online?'green':'red'}">${u.online?'online':'offline'}</span> <span class="pill blue">${esc(u.role)}</span></p><p class="muted">XP: ${u.xp||0} · Badges: ${(u.badges||[]).join(" ")}</p><button class="smallBtn" onclick="activeTab='chats';render();setTimeout(()=>openChat('${["dm",me.id,u.id].sort().join("_")}','${esc(u.name)}'),100)">Enviar mensaje</button></div>`).join("")}</div>`;
}

function renderAnnouncements(){
 setTitle("Anuncios","Comunicados globales para todo el equipo");
 let arr=Object.values(anns).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
 document.getElementById("content").innerHTML=`<div class="grid"><div class="box"><h3>Nuevo anuncio</h3><div class="formGrid"><input id="aTitle" placeholder="Título"><textarea id="aText" placeholder="Mensaje"></textarea><button class="smallBtn full" onclick="createAnn()">Publicar anuncio</button></div></div>${arr.map(a=>`<div class="box"><h3>${esc(a.title)}</h3><p>${esc(a.text)}</p><p class="muted">Por ${esc(a.from)} · ${date(a.createdAt)} ${time(a.createdAt)}</p>${isAdmin()?`<button class="smallBtn danger" onclick="del('announcements/${a.id}')">Eliminar</button>`:""}</div>`).join("")}</div>`;
}
function createAnn(){let id=uid();db.ref("announcements/"+id).set({id,title:val("aTitle"),text:val("aText"),from:me.name,createdAt:Date.now()})}

function renderProfile(){
 setTitle("Mi Perfil","Nivel, XP, logros y configuración");
 let lv=getLevel(me.xp||0),nx=nextLevel(me.xp||0),pct=nx?Math.min(100,((me.xp-lv.xp)/(nx.xp-lv.xp))*100):100;
 let myTasks=Object.values(tasks).filter(t=>t.assignedTo===me.id);let done=myTasks.filter(t=>t.status==="completada").length;
 document.getElementById("content").innerHTML=`<div class="grid"><div class="box"><div class="row"><div class="avatar" style="background:${me.color};width:64px;height:64px">${esc(me.avatar)}</div><div><h3>${esc(me.name)}</h3><p class="muted">${esc(me.role)} · ${esc(me.dept||"")}</p></div></div><h3>${lv.icon} Nivel ${lv.l}: ${lv.name}</h3><p class="muted">${me.xp||0} XP ${nx?`/ Próximo: ${nx.xp}`:""}</p><div class="progress"><div class="bar" style="width:${pct}%"></div></div><p>Badges: ${(me.badges||[]).join(" ")||"Sin badges"}</p></div><div class="box"><h3>Resumen</h3><p>Tareas asignadas: ${myTasks.length}</p><p>Completadas: ${done}</p><p>Pendientes: ${myTasks.length-done}</p></div><div class="box"><h3>Sonidos</h3><p class="muted">Prueba rápida del sonido de notificación.</p><button class="smallBtn" onclick="beep()">▶ Probar sonido</button></div></div>`;
}

function renderAdmin(){
 setTitle("Administración","Usuarios, canales, niveles y datos del sistema");
 if(!isAdmin()){document.getElementById("content").innerHTML=`<div class="grid"><div class="box"><h3>Acceso restringido</h3><p>Solo administrador puede usar este módulo.</p></div></div>`;return}
 document.getElementById("content").innerHTML=`<div class="grid">
 <div class="box"><h3>Crear usuario</h3><div class="formGrid"><input id="uName" placeholder="Nombre"><input id="uUser" placeholder="usuario"><input id="uPass" placeholder="clave" value="1234"><select id="uRole"><option>usuario</option><option>administrador</option></select><input id="uDept" placeholder="Área"><button class="smallBtn full" onclick="createUser()">Crear usuario</button></div></div>
 <div class="box"><h3>Crear canal</h3><div class="formGrid"><input id="rName" placeholder="Nombre canal"><input id="rIcon" placeholder="Icono" value="💬"><input id="rDesc" class="full" placeholder="Descripción"><button class="smallBtn full" onclick="createRoom()">Crear canal</button></div></div>
 <div class="box"><h3>Usuarios</h3>${Object.values(users).map(u=>`<p>${esc(u.name)} · ${esc(u.role)} <button class="smallBtn danger" onclick="del('users/${u.id}')">Eliminar</button></p>`).join("")}</div>
 <div class="box"><h3>Canales</h3>${Object.values(rooms).map(r=>`<p>${r.icon} ${esc(r.name)} <button class="smallBtn danger" onclick="del('rooms/${r.id}')">Eliminar</button></p>`).join("")}</div>
 <div class="box"><h3>Reset anual XP</h3><p class="muted">Archiva el XP actual y vuelve a cero.</p><button class="smallBtn danger" onclick="annualReset()">Ejecutar reset</button></div>
 </div>`;
}
function createUser(){let name=val("uName"),username=val("uUser").toLowerCase();if(!name||!username)return alert("Faltan datos");let av=name.split(" ").map(x=>x[0]).join("").slice(0,2).toUpperCase();db.ref("users/"+username).set({id:username,username,password:val("uPass")||"1234",name,role:val("uRole"),dept:val("uDept"),avatar:av,color:"#"+Math.floor(Math.random()*16777215).toString(16),online:false,xp:0,badges:[]})}
function createRoom(){let name=val("rName");if(!name)return;let id=name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"_");db.ref("rooms/"+id).set({id,name,icon:val("rIcon")||"💬",desc:val("rDesc")||"Canal"})}
function annualReset(){if(!confirm("¿Resetear XP anual?"))return;let up={};Object.values(users).forEach(u=>{up["users/"+u.id+"/history/"+new Date().getFullYear()]={xp:u.xp||0,at:Date.now()};up["users/"+u.id+"/xp"]=0});db.ref().update(up)}
function del(path){if(confirm("¿Eliminar?"))db.ref(path).remove()}
function val(id){return document.getElementById(id)?.value?.trim()||""}
function openNewRoom(){activeTab="admin";document.querySelectorAll(".nav button").forEach(x=>x.classList.toggle("active",x.dataset.tab==="admin"));render()}
function closeModal(){document.getElementById("modal").classList.add("hidden")}

seed().catch(e=>err("ERROR INICIAL FIREBASE:\\n"+(e.message||e)));
</script>
</body>
</html>
