<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BINET Sistema</title>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0c0c0f;color:white}
.hidden{display:none}
#login{height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:#1a1a22;padding:30px;border-radius:20px;width:300px}
input{width:100%;margin:10px 0;padding:10px;border-radius:10px;border:none}
button{width:100%;padding:10px;border:none;border-radius:10px;background:#6c63ff;color:white}

#app{display:none;height:100vh;flex-direction:column}
#chat{flex:1;overflow:auto;padding:10px}
.mine{background:#6c63ff;padding:10px;margin:5px;border-radius:10px;align-self:flex-end}
.other{background:#222;padding:10px;margin:5px;border-radius:10px}
#sendBox{display:flex}
#msg{flex:1;padding:10px}
</style>
</head>

<body>

<div id="login">
  <div class="box">
    <h2>BINET</h2>
    <input id="user" placeholder="usuario">
    <input id="pass" type="password" placeholder="clave">
    <button onclick="login()">Ingresar</button>
    <div id="error" style="color:red;margin-top:10px;"></div>
  </div>
</div>

<div id="app">
  <div id="chat"></div>
  <div id="sendBox">
    <input id="msg">
    <button onclick="send()">➤</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB0HVVTUhkswLkLORXLIZwOCoSLKsKDpuC",
  authDomain: "binet-e3ac3.firebaseapp.com",
  databaseURL: "https://binet-e3ac3-default-rtdb.firebaseio.com",
  projectId: "binet-e3ac3",
  storageBucket: "binet-e3ac3.appspot.com",
  messagingSenderId: "272460687857",
  appId: "1:272460687857:web:badaa5c917b5192203fc50"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser=null;

const users = {
  rich:{pass:"1234",name:"Richard"},
  ariana:{pass:"1234",name:"Ariana"},
  kari:{pass:"1234",name:"Kari"}
};

function login(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  if(!users[u] || users[u].pass!==p){
    document.getElementById("error").innerText="Datos incorrectos";
    return;
  }

  currentUser=u;

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="flex";

  listen();
}

function listen(){
  db.ref("messages").on("child_added",snap=>{
    let m=snap.val();
    let div=document.createElement("div");
    div.className=m.user===currentUser?"mine":"other";
    div.innerHTML="<b>"+m.user+"</b><br>"+m.text;
    document.getElementById("chat").appendChild(div);
  });
}

function send(){
  let txt=document.getElementById("msg").value;
  if(!txt)return;

  db.ref("messages").push({
    user:currentUser,
    text:txt
  });

  document.getElementById("msg").value="";
}
</script>

</body>
</html>
