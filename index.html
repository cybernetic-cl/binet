   Reemplaza estos datos con la configuración de tu proyecto Firebase.
   Activa Authentication > Email/Password y Firestore Database.
*/
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_PROYECTO.firebaseapp.com",
  projectId: "TU_PROYECTO",
  storageBucket: "TU_PROYECTO.appspot.com",
  messagingSenderId: "TU_MESSAGING_ID",
  appId: "TU_APP_ID"
};

const FIREBASE_READY = firebaseConfig.apiKey && firebaseConfig.apiKey !== "TU_API_KEY";
let fbApp = null, fbAuth = null, fbDb = null;
if (FIREBASE_READY) {
  fbApp = firebase.apps.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
  fbAuth = firebase.auth();
  fbDb = firebase.firestore();
}

function cleanUsername(v){
  return String(v||"").trim().toLowerCase().replace(/\s+/g,"");
}
function usernameToEmail(username){
  const safe = cleanUsername(username).replace(/[^a-z0-9._-]/g,"_");
  return `${safe}@binet.local`;
}
function initialsFromName(name){
  return String(name||"").trim().split(/\s+/).map(w=>w[0]).join("").toUpperCase().slice(0,2) || "U";
}
async function firebaseCreateEmployee(form){
  if (!FIREBASE_READY) throw new Error("Configura firebaseConfig antes de crear usuarios.");
  const username = cleanUsername(form.username);
  const email = usernameToEmail(username);
  const usernameRef = fbDb.collection("usernames").doc(username);
  const exists = await usernameRef.get();
  if (exists.exists) throw new Error("Ese nombre de usuario ya está en uso");

  const secondaryName = "secondary-" + Date.now();
  const secondaryApp = firebase.initializeApp(firebaseConfig, secondaryName);
  const secondaryAuth = secondaryApp.auth();
  try {
    const cred = await secondaryAuth.createUserWithEmailAndPassword(email, form.password);
    const uid = cred.user.uid;
    await cred.user.updateProfile({displayName: form.name.trim()});
    const newUser = {
      id: uid,
      uid,
      name: form.name.trim(),
      username,
      email,
      role: form.role || "Employee",
      dept: form.dept || "General",
      avatar: initialsFromName(form.name),
      color: form.color || "#6c63ff",
      online: false,
      xp: 0,
      level: 1,
      badges: [],
      yearHistory: [],
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      active: true
    };
    await fbDb.collection("users").doc(uid).set(newUser, {merge:true});
    await usernameRef.set({uid, email, username, active:true, createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    await secondaryAuth.signOut();
    await secondaryApp.delete();
    return {...newUser, createdAt: Date.now()};
  } catch(e) {
    try { await secondaryAuth.signOut(); await secondaryApp.delete(); } catch(_e) {}
    if (String(e.code||"").includes("email-already-in-use")) throw new Error("Ese usuario ya existe en Firebase Authentication");
    throw e;
  }
}
async function firebaseLoginWithUsername(username, password){
  if (!FIREBASE_READY) throw new Error("Configura firebaseConfig antes de iniciar sesión con Firebase.");
  const userNameKey = cleanUsername(username);
  const usernameDoc = await fbDb.collection("usernames").doc(userNameKey).get();
  if (!usernameDoc.exists) throw new Error("Usuario o contraseña incorrectos");
  const {email, uid, active} = usernameDoc.data();
  if (active === false) throw new Error("Usuario desactivado");
  const cred = await fbAuth.signInWithEmailAndPassword(email, password);
  const realUid = uid || cred.user.uid;
  const userDoc = await fbDb.collection("users").doc(realUid).get();
  if (!userDoc.exists) throw new Error("Empleado no encontrado en Firestore");
  const employee = userDoc.data();
  await fbDb.collection("users").doc(realUid).set({online:true,lastLogin:firebase.firestore.FieldValue.serverTimestamp()}, {merge:true});
  return {...employee, id: realUid, uid: realUid, online:true};
}
async function firebaseUpdateEmployee(userId, data){
  if (!FIREBASE_READY) return;
  const copy = {...data};
  delete copy.password; delete copy.confirmPass;
  await fbDb.collection("users").doc(userId).set(copy, {merge:true});
}
async function firebaseDeleteEmployee(user){
  if (!FIREBASE_READY || !user?.id) return;
  const deletedPayload = {
    ...user,
    active:false,
    online:false,
    deletedAt: firebase.firestore.FieldValue.serverTimestamp(),
    deletedBy: fbAuth?.currentUser?.uid || null
  };
  const batch = fbDb.batch();
  batch.set(fbDb.collection("users").doc(user.id), {
    active:false,
    online:false,
    deletedAt: firebase.firestore.FieldValue.serverTimestamp(),
    deletedBy: fbAuth?.currentUser?.uid || null
  }, {merge:true});
  batch.set(fbDb.collection("deleted_users").doc(user.id), deletedPayload, {merge:true});
  if (user.username) {
    batch.set(fbDb.collection("usernames").doc(cleanUsername(user.username)), {active:false, deletedAt:firebase.firestore.FieldValue.serverTimestamp()}, {merge:true});
  }
  await batch.commit();
}

async function firebaseGrantXp(user, amount){
  if (!FIREBASE_READY || !user?.id) return;
  await fbDb.collection("users").doc(user.id).set({
    xp: Number(user.xp||0) + Number(amount||0),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }, {merge:true});
}

/* ── SOUND ENGINE ────────────────────────────────────────── */
// Web Audio API — generates all sounds procedurally, no files needed
const AudioCtx = typeof window !== "undefined" ? (window.AudioContext || window.webkitAudioContext) : null;
let _audioCtx = null;
let _soundEnabled = true;
let _soundVolume = 0.5; // 0.0 - 1.0

function getAudioCtx() {
  if (!_audioCtx && AudioCtx) _audioCtx = new AudioCtx();
  return _audioCtx;
}

function playSound(type) {
  if (!_soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    if (!ctx) return;
    // Resume if suspended (browser autoplay policy)
    if (ctx.state === "suspended") ctx.resume();

    const gain = ctx.createGain();
    gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0, ctx.currentTime);

    switch(type) {
      case "message_send": {
        // Soft click — short high beep
        const o = ctx.createOscillator();
        o.connect(gain);
        o.type = "sine";
        o.frequency.setValueAtTime(880, ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(660, ctx.currentTime + 0.08);
        gain.gain.setValueAtTime(_soundVolume * 0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
        o.start(ctx.currentTime);
        o.stop(ctx.currentTime + 0.13);
        break;
      }
      case "message_receive": {
        // Two-tone gentle ping (WhatsApp style)
        [0, 0.1].forEach((delay, i) => {
          const o = ctx.createOscillator();
          o.connect(gain);
          o.type = "sine";
          o.frequency.setValueAtTime(i === 0 ? 520 : 660, ctx.currentTime + delay);
          gain.gain.setValueAtTime(_soundVolume * 0.25, ctx.currentTime + delay);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.18);
          o.start(ctx.currentTime + delay);
          o.stop(ctx.currentTime + delay + 0.2);
        });
        break;
      }
      case "notification": {
        // Triple soft ding
        [0, 0.13, 0.26].forEach((delay, i) => {
          const o = ctx.createOscillator();
          o.connect(gain);
          o.type = "triangle";
          o.frequency.setValueAtTime([440, 554, 659][i], ctx.currentTime + delay);
          gain.gain.setValueAtTime(_soundVolume * 0.3, ctx.currentTime + delay);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.22);
          o.start(ctx.currentTime + delay);
          o.stop(ctx.currentTime + delay + 0.25);
        });
        break;
      }
      case "task_complete": {
        // Victory jingle — ascending chord
        [0, 0.1, 0.2, 0.35].forEach((delay, i) => {
          const o = ctx.createOscillator();
          o.connect(gain);
          o.type = "sine";
          o.frequency.setValueAtTime([523, 659, 784, 1047][i], ctx.currentTime + delay);
          gain.gain.setValueAtTime(_soundVolume * 0.35, ctx.currentTime + delay);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.3);
          o.start(ctx.currentTime + delay);
          o.stop(ctx.currentTime + delay + 0.35);
        });
        break;
      }
      case "achievement": {
        // Fanfare — triumphant ascending
        const notes = [523, 659, 784, 659, 784, 1047];
        const times = [0, 0.1, 0.2, 0.35, 0.45, 0.55];
        notes.forEach((freq, i) => {
          const o = ctx.createOscillator();
          o.connect(gain);
          o.type = i === notes.length-1 ? "sine" : "triangle";
          o.frequency.setValueAtTime(freq, ctx.currentTime + times[i]);
          gain.gain.setValueAtTime(_soundVolume * (i === notes.length-1 ? 0.45 : 0.3), ctx.currentTime + times[i]);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + times[i] + 0.25);
          o.start(ctx.currentTime + times[i]);
          o.stop(ctx.currentTime + times[i] + 0.3);
        });
        break;
      }
      case "task_assigned": {
        // Alert — attention sound
        const o = ctx.createOscillator();
        o.connect(gain);
        o.type = "sawtooth";
        o.frequency.setValueAtTime(440, ctx.currentTime);
        o.frequency.setValueAtTime(550, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(_soundVolume * 0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
        o.start(ctx.currentTime);
        o.stop(ctx.currentTime + 0.28);
        break;
      }
      case "login": {
        // Welcome — warm chord
        [0, 0.15, 0.3].forEach((delay, i) => {
          const o = ctx.createOscillator();
          o.connect(gain);
          o.type = "sine";
          o.frequency.setValueAtTime([392, 494, 587][i], ctx.currentTime + delay);
          gain.gain.setValueAtTime(_soundVolume * 0.28, ctx.currentTime + delay);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.4);
          o.start(ctx.currentTime + delay);
          o.stop(ctx.currentTime + delay + 0.45);
        });
        break;
      }
      case "error": {
        // Low buzz — error feedback
        const o = ctx.createOscillator();
        o.connect(gain);
        o.type = "square";
        o.frequency.setValueAtTime(180, ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(120, ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(_soundVolume * 0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
        o.start(ctx.currentTime);
        o.stop(ctx.currentTime + 0.2);
        break;
      }
      case "level_up": {
        // Level up — epic ascending scale
        const lvNotes = [523, 587, 659, 698, 784, 880, 988, 1047];
        lvNotes.forEach((freq, i) => {
          const o = ctx.createOscillator();
          o.connect(gain);
          o.type = i >= 6 ? "sine" : "triangle";
          o.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.07);
          gain.gain.setValueAtTime(_soundVolume * (i >= 6 ? 0.4 : 0.25), ctx.currentTime + i * 0.07);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.07 + 0.2);
          o.start(ctx.currentTime + i * 0.07);
          o.stop(ctx.currentTime + i * 0.07 + 0.25);
        });
        break;
      }
      default: break;
    }
  } catch(e) { /* silent fail */ }
}

// Global mutable ref so getLv/xpToNext can read current levels without prop drilling
let _LEVELS = [...DEFAULT_LEVELS];
function getLv(xp) {
  let lv = _LEVELS[0];
  for (const v of _LEVELS) if (xp >= v.xp) lv = v;
  return lv;
}
function xpToNext(xp) {
  const next = _LEVELS.find(l => l.xp > xp);
  return next ? next.xp : 9999;
}
/* ── ORG CHART HELPERS ──────────────────────────────────── */
// Returns all user IDs that `userId` can assign tasks to
function getAssignableTargets(userId, allUsers) {
  const meUser = allUsers.find(u => u.id === userId);
  if (!meUser) return [];
  // Admin can assign to everyone
  if (meUser.role === "Admin") return allUsers.filter(u => u.id !== userId).map(u => u.id);
  const result = [];
  allUsers.forEach(u => {
    if (u.id === userId) return;
    // Can always assign to direct reports
    if (u.reportsTo === userId) { result.push(u.id); return; }
    // Can assign to anyone who reports to someone I manage (indirect)
    const reportsBoss = allUsers.find(b => b.id === u.reportsTo);
    if (reportsBoss && reportsBoss.reportsTo === userId) { result.push(u.id); return; }
    // Can assign upward only if canAssignUp is true
    if (meUser.canAssignUp && u.reportsTo !== userId) {
      // can assign to boss
      if (u.id === meUser.reportsTo) { result.push(u.id); return; }
    }
    // Managers can also assign to peers in same area
    if (meUser.role === "Manager" && u.dept === meUser.dept && u.role === "Employee") {
      result.push(u.id);
    }
  });
  return [...new Set(result)];
}

// Returns the full chain from root to user
function getChain(userId, allUsers) {
  const chain = [];
  let current = allUsers.find(u => u.id === userId);
  let depth = 0;
  while (current && depth < 10) {
    chain.unshift(current);
    if (!current.reportsTo) break;
    current = allUsers.find(u => u.id === current.reportsTo);
    depth++;
  }
  return chain;
}

// Build tree structure for org chart
function buildOrgTree(allUsers, rootId) {
  const root = allUsers.find(u => u.id === rootId || (!rootId && !u.reportsTo));
  if (!root) return null;
  function buildNode(u) {
    const children = allUsers.filter(x => x.reportsTo === u.id).map(buildNode);
    return {...u, children};
  }
  return buildNode(root);
}

/* ── XP BAR ──────────────────────────────────────────────── */
function XPBar({xp,compact=false}) {
  const lv = getLv(xp);
  const next = xpToNext(xp);
  const prev = lv.xp;
  const pct = Math.min(100, ((xp - prev) / (next - prev)) * 100);
  return (
    <div>
      {!compact && <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
        <span style={{fontSize:11,color:T.text2,fontWeight:500}}>{lv.icon||'⭐'} LV{lv.l} · {lv.t}</span>
        <span style={{fontSize:11,color:T.text3,fontFamily:"'DM Mono',monospace"}}>{xp}/{next} XP</span>
      </div>}
      <div style={{height:compact?4:6,background:T.bg4,borderRadius:8,overflow:"hidden"}}>
        <div style={{height:"100%",width:pct+"%",background:`linear-gradient(90deg,${T.accent},${T.accent2})`,borderRadius:8,transition:"width .6s ease"}}/>
      </div>
    </div>
  );
}

    <div style={{width:"100%",height:"100vh",background:T.bg,display:"flex",flexDirection:"column",maxWidth:1200,margin:"0 auto",position:"relative",overflow:"hidden"}}>
      <Toast toasts={toasts}/>

      {/* MODAL */}
      {/* CONFIRM DIALOG */}
      {confirmModal && (
        <div onClick={()=>setConfirmModal(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div onClick={e=>e.stopPropagation()} style={{background:T.surface,border:`2px solid ${confirmModal.danger?T.red:T.border2}`,borderRadius:20,padding:"24px",maxWidth:320,width:"100%",animation:"pop .2s ease-out",boxShadow:"0 16px 48px rgba(0,0,0,.7)"}}>
            <div style={{fontSize:28,textAlign:"center",marginBottom:12}}>{confirmModal.danger?"🗑️":"⚠️"}</div>
            <div style={{fontSize:14,fontWeight:600,color:T.text,textAlign:"center",marginBottom:6}}>
              {confirmModal.danger ? "¿Confirmar eliminación?" : "¿Confirmar acción?"}
            </div>
            <div style={{fontSize:13,color:T.text2,textAlign:"center",marginBottom:20,lineHeight:1.5}}>{confirmModal.msg}</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setConfirmModal(null)} style={{flex:1,padding:"11px",borderRadius:12,background:T.bg3,border:`1px solid ${T.border}`,fontSize:13,fontWeight:500,color:T.text2,cursor:"pointer"}}>
                Cancelar
              </button>
              <button onClick={()=>{ confirmModal.onConfirm(); setConfirmModal(null); }} style={{
                flex:1,padding:"11px",borderRadius:12,
                background: confirmModal.danger ? `rgba(239,68,68,.15)` : `${T.accent}22`,
                border:`1px solid ${confirmModal.danger?T.red:T.accent}`,
                fontSize:13,fontWeight:700,
                color: confirmModal.danger ? T.red : T.accent2,
                cursor:"pointer",
              }}>
                {confirmModal.danger ? "Sí, eliminar" : "Confirmar"}
              </button>
            </div>
          </div>
        </div>
      )}
      {modal && <ModalLayer modal={modal} setModal={setModal} tasks={tasks} setTasks={setTasks} users={users} setUsers={setUsers} me={me} setMe={setMe} achievements={achievements} setAchievements={setAchievements} addToast={addToast} groups={groups} setGroups={setGroups} announcements={announcements} setAnnouncements={setAnnouncements}/>}

      {/* ACTIVE CHAT VIEW */}
      {activeChat ? (
        <ChatView
          chat={activeChat}
          messages={messages}
          composeText={composeText}
          setComposeText={setComposeText}
          sendMsg={sendMsg}
          onBack={()=>setActiveChat(null)}
          me={me}
          bottomRef={bottomRef}
          users={users}
          setModal={setModal}
          typingUsers={typingUsers}
          announcements={announcements}
        />
      ) : (
        <>
          {/* HEADER */}
          <AppHeader tab={activeTab} me={me} notifCount={notifCount} setModal={setModal} onProfile={()=>setModal({type:"profile",data:me})} onLogout={()=>{setScreen("login");setActiveTab("chats");setActiveChat(null);setLoginUser("");setLoginPass("");setLoginError("");}} />

          {/* TAB CONTENT */}
          <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
            {activeTab === "chats" && <ChatsTab chats={filteredChats} searchQ={searchQ} setSearchQ={setSearchQ} setActiveChat={setActiveChat} setModal={setModal} announcements={announcements} me={me} messages={messages}/>}
            {activeTab === "tasks" && <TasksTab tasks={tasks} view={activeTaskView} setView={setActiveTaskView} onUpdate={updateTaskStatus} setModal={setModal} me={me} users={users} overdue={overdueTasks}/>}
            {activeTab === "people" && <PeopleTab users={users} me={me} setModal={setModal} setActiveChat={setActiveChat}/>}
            {activeTab === "profile" && <ProfileTab me={me} userStats={userStats} achievements={achievements} tasks={tasks} setModal={setModal} soundEnabled={soundEnabled} soundVolume={soundVolume}/>}
            {activeTab === "admin" && <AdminTab users={users} setUsers={setUsers} achievements={achievements} setAchievements={setAchievements} tasks={tasks} setTasks={setTasks} adminTab={activeAdminTab} setAdminTab={setActiveAdminTab} setModal={setModal} me={me} addToast={addToast} levels={levels} setLevels={setLevels} onAnnualReset={doAnnualReset} areas={areas} setAreas={setAreas} askConfirm={askConfirm}/>}
          </div>

          {/* BOTTOM NAV */}
          <BottomNav tab={activeTab} setTab={setActiveTab} me={me} tasks={tasks} unread={allChats.reduce((a,c)=>a+c.unread,0)}/>
        </>
      )}
    </div>
  );
}

function ChatListItem({chat, onClick}) {
  const name = chat.type === "dm" ? chat.user.name : chat.group.name;
  const avatar = chat.type === "dm" ? null : null;
  const lastText = chat.last?.text || "Sin mensajes";
  const color = chat.type === "dm" ? chat.user.color : chat.group.color;
  return (
    <button onClick={onClick} style={{
      width:"100%",display:"flex",alignItems:"center",gap:12,
      padding:"10px 8px",borderRadius:14,
      background: chat.unread > 0 ? `${T.surface}aa` : "transparent",
      border: "1px solid transparent",
      transition:"all .15s",marginBottom:2,
    }}>
      {chat.type === "dm" ? (
        <Avatar user={chat.user} size={48} showBadge/>
      ) : (
        <div style={{width:48,height:48,borderRadius:16,background:`${color}22`,border:`1px solid ${color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{chat.group.avatar}</div>
      )}
      <div style={{flex:1,minWidth:0,textAlign:"left"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
          <span style={{fontSize:14,fontWeight: chat.unread>0?600:500,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"60%"}}>{name}</span>
          <span style={{fontSize:10,color:T.text3,flexShrink:0}}>{chat.last ? timeAgo(chat.last.ts) : ""}</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:12,color:chat.unread>0?T.text2:T.text3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{lastText.slice(0,45)}{lastText.length>45?"...":""}</span>
          {chat.unread > 0 && <span style={{background:T.accent,color:"#fff",borderRadius:99,fontSize:10,padding:"1px 7px",fontWeight:700,flexShrink:0,marginLeft:8}}>{chat.unread}</span>}

/* ══ CHAT VIEW ══ */
function ChatView({chat, messages, composeText, setComposeText, sendMsg, onBack, me, bottomRef, users, setModal, typingUsers, announcements}) {
  const key = chat.type === "dm" ? `dm_${chat.id}` : chat.id;
  const typingInfo = typingUsers?.[key] || null;
  const msgs = messages[key] || [];
  const isAnnounce = chat.type === "announce";

  let headerName, headerSub, headerColor;
  if (chat.type === "dm") {
    const u = USERS.find(x=>x.id===chat.id);
    headerName = u?.name; headerSub = `${u?.role} · ${u?.dept}`; headerColor = u?.color;
  } else if (chat.type === "group") {
    const g = GROUPS.find(x=>x.id===chat.id);
    headerName = g?.name; headerSub = `${g?.members?.length} miembros`; headerColor = g?.color;
  } else {
    headerName = "Anuncios Globales"; headerSub = "Comunicaciones de la empresa"; headerColor = T.accent;
  }

  // announcements passed as prop

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:T.bg}}>
      {/* Header */}
      <div style={{padding:"12px 16px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:12,background:T.surface,flexShrink:0}}>
        <button onClick={onBack} style={{padding:"6px",borderRadius:10,background:T.bg3,border:`1px solid ${T.border}`,fontSize:16,color:T.text2}}>←</button>
        <div style={{flex:1}}>
          <div style={{fontSize:15,fontWeight:600,color:T.text}}>{headerName}</div>
          {typingInfo ? (
            <div style={{display:"flex",alignItems:"center",gap:5,animation:"fadeIn .2s ease-out"}}>
              <div style={{display:"flex",gap:2,alignItems:"center"}}>
                <div className="typing-dot" style={{width:4,height:4,borderRadius:"50%",background:T.accent2}}/>
                <div className="typing-dot" style={{width:4,height:4,borderRadius:"50%",background:T.accent2}}/>
                <div className="typing-dot" style={{width:4,height:4,borderRadius:"50%",background:T.accent2}}/>
              </div>
              <span style={{fontSize:11,color:T.accent2,fontStyle:"italic"}}>escribiendo...</span>
            </div>
          ) : (
            <div style={{fontSize:11,color:T.text3}}>{headerSub}</div>
          )}
        </div>
        {chat.type === "dm" && (
          <button onClick={()=>setModal({type:"assignTask",data:{assignTo:chat.id}})} style={{padding:"7px 12px",borderRadius:10,background:`${T.accent}22`,border:`1px solid ${T.accent}44`,fontSize:12,color:T.accent2,fontWeight:500}}>
            + Tarea
          </button>
        )}
      </div>

      {/* Messages */}
      {isAnnounce ? (
        <div className="scroll" style={{flex:1,overflowY:"auto",padding:"16px"}}>
          <AnnouncementsFeed chat={chat} setModal={setModal} me={me} announcements={announcements}/>
        </div>
      ) : (
        <div className="scroll" style={{flex:1,overflowY:"auto",padding:"12px 16px",display:"flex",flexDirection:"column",gap:4}}>
          {msgs.length === 0 && <div style={{textAlign:"center",padding:40,color:T.text3,fontSize:13}}>Inicia la conversación</div>}
          {msgs.map((msg, i) => {
            const isMe = msg.from === "me";
            const sender = isMe ? me : (USERS.find(u=>u.id===msg.from));
            const showAvatar = !isMe && (i===0 || msgs[i-1]?.from !== msg.from);
            return (
              <div key={msg.id} className="msg-in" style={{display:"flex",flexDirection:isMe?"row-reverse":"row",gap:8,alignItems:"flex-end",marginBottom:2}}>
                {!isMe && (showAvatar ? <Avatar user={sender} size={28}/> : <div style={{width:28}}/>)}
                <div style={{
                  maxWidth:"75%",padding:"9px 13px",
                  borderRadius: isMe?"16px 16px 4px 16px":"16px 16px 16px 4px",
                  background: isMe ? `linear-gradient(135deg,${T.accent},${T.accent3})` : T.surface2,
                  border: isMe ? "none" : `1px solid ${T.border}`,
                  boxShadow: isMe ? `0 4px 12px ${T.accent}33` : "none",
                }}>
                  {!isMe && showAvatar && chat.type === "group" && (
                    <div style={{fontSize:10,color:sender?.color||T.accent2,fontWeight:600,marginBottom:3}}>{sender?.name}</div>
                  )}
                  <div style={{fontSize:14,color:isMe?"#fff":T.text,lineHeight:1.4}}>{msg.text}</div>
                  <div style={{fontSize:10,color:isMe?"rgba(255,255,255,.5)":T.text3,marginTop:3,textAlign:isMe?"right":"left"}}>{timeAgo(msg.ts)}</div>
                </div>
              </div>
            );
          })}
          {/* Typing indicator bubble */}
          {typingInfo && (
            <div className="msg-in" style={{display:"flex",flexDirection:"row",gap:8,alignItems:"flex-end",marginBottom:4}}>
              <Avatar user={typingInfo.userId} size={28}/>
              <div style={{
                padding:"10px 14px",
                borderRadius:"16px 16px 16px 4px",
                background:T.surface2,
                border:`1px solid ${T.border}`,
                display:"flex",alignItems:"center",gap:5,
                minWidth:56,
              }}>
                <div className="typing-dot" style={{width:6,height:6,borderRadius:"50%",background:T.text3}}/>
                <div className="typing-dot" style={{width:6,height:6,borderRadius:"50%",background:T.text3}}/>
                <div className="typing-dot" style={{width:6,height:6,borderRadius:"50%",background:T.text3}}/>
              </div>
            </div>
          )}
          <div ref={bottomRef}/>
        </div>
      )}

      {/* Compose */}
      {!isAnnounce && (
        <div style={{padding:"8px 12px",paddingBottom:"max(8px,env(safe-area-inset-bottom))",background:T.surface,borderTop:`1px solid ${T.border}`,display:"flex",gap:8,alignItems:"flex-end",flexShrink:0}}>
          <div style={{flex:1,background:T.bg3,border:`1px solid ${T.border2}`,borderRadius:16,display:"flex",alignItems:"center",padding:"8px 14px",gap:8}}>
            <textarea
              value={composeText}
              onChange={e=>setComposeText(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}}}
              placeholder="Escribe un mensaje..."
              rows={1}
              style={{flex:1,fontSize:14,color:T.text,lineHeight:1.4,maxHeight:80,overflowY:"auto",background:"transparent"}}
            />
          </div>
          <button onClick={sendMsg} style={{
            width:44,height:44,borderRadius:14,flexShrink:0,
            background: composeText.trim() ? `linear-gradient(135deg,${T.accent},${T.accent3})` : T.bg3,
            border:`1px solid ${composeText.trim()?T.accent:T.border}`,
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:20,transition:"all .15s",
            boxShadow: composeText.trim() ? `0 4px 12px ${T.accent}44` : "none",
          }}>➤</button>
        </div>
      )}
    </div>
  );
}

/* ══ TASKS TAB ══ */
function TasksTab({tasks, view, setView, onUpdate, setModal, me, users, overdue}) {
  const myTasks = tasks.filter(t => t.assignedTo === "me");
  const teamTasks = tasks.filter(t => t.assignedBy === "me" && t.assignedTo !== "me");
  const allTasks = tasks;
  const displayed = view === "my" ? myTasks : view === "team" ? teamTasks : allTasks;
  const pending = myTasks.filter(t=>t.status!=="completed").length;

  return (
    <div className="scroll" style={{flex:1,overflowY:"auto"}}>
      <div style={{padding:"8px 16px 0"}}>
        {/* Stats row */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
          {[
            {label:"Pendientes",val:pending,color:T.orange,icon:"○"},
            {label:"Completadas",val:myTasks.filter(t=>t.status==="completed").length,color:T.green,icon:"●"},
            {label:"Vencidas",val:overdue.length,color:T.red,icon:"⚠"},
          ].map(s => (
            <div key={s.label} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:"10px 12px",textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:700,color:s.color}}>{s.val}</div>
              <div style={{fontSize:10,color:T.text3,marginTop:1}}>{s.label}</div>
            </div>
          ))}
        </div>

        {/* View selector */}
        <div style={{display:"flex",gap:6,background:T.surface,borderRadius:12,padding:4,marginBottom:12}}>
          {[["my","Mis Tareas"],["team","Mi Equipo"],["all","Todas"]].map(([v,l])=>(
            <button key={v} onClick={()=>setView(v)} style={{
              flex:1,padding:"7px",borderRadius:9,fontSize:12,fontWeight:500,
              background:view===v?T.bg4:"transparent",
              color:view===v?T.text:T.text3,
              border:view===v?`1px solid ${T.border2}`:"1px solid transparent",
              transition:"all .15s",
            }}>{l}</button>
          ))}
        </div>

        {/* New Task button */}
        <button onClick={()=>setModal({type:"newTask"})} style={{
          width:"100%",padding:"11px",borderRadius:12,marginBottom:12,
          border:`1px dashed ${T.accent}66`,background:`${T.accent}08`,
          fontSize:13,color:T.accent2,fontWeight:500,display:"flex",alignItems:"center",justifyContent:"center",gap:8,
        }}>
          <span style={{fontSize:18}}>➕</span> Nueva tarea
        </button>
      </div>

      {/* Task list */}
      <div style={{padding:"0 16px 16px",display:"flex",flexDirection:"column",gap:8}}>
        {displayed.length === 0 && <div style={{textAlign:"center",padding:40,color:T.text3,fontSize:13}}>No hay tareas en esta vista</div>}
        {displayed.map(t => (
          <TaskCard key={t.id} task={t} onUpdate={onUpdate} setModal={setModal} me={me} users={users}/>
        ))}
      </div>
    </div>
  );
}

function TaskCard({task, onUpdate, setModal, me, users}) {
  const pc = PRIORITY_CFG[task.priority];
  const sc = STATUS_CFG[task.status];
  const assignedUser = task.assignedTo === "me" ? {name:"Tú",avatar:"YO",color:T.accent} : USERS.find(u=>u.id===task.assignedTo);
  const assignedBy = task.assignedBy === "me" ? {name:"Tú"} : USERS.find(u=>u.id===task.assignedBy);
  const isOverdue = task.status !== "completed" && new Date(task.dueDate) < new Date();
  const isMyTask = task.assignedTo === "me";

  return (
    <div className="fade-up" style={{
      background:T.surface,border:`1px solid ${isOverdue?T.red+"44":T.border}`,
      borderRadius:16,padding:"14px",
      borderLeft:`3px solid ${pc.color}`,
      transition:"all .15s",
    }}>
      {/* Top row */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
        <div style={{flex:1,marginRight:8}}>
          <div style={{fontSize:14,fontWeight:600,color:task.status==="completed"?T.text3:T.text,textDecoration:task.status==="completed"?"line-through":"none",lineHeight:1.3}}>{task.title}</div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
          <Badge label={pc.label} color={pc.color} bg={pc.bg}/>
        </div>
      </div>

      {/* Desc */}
      {task.desc && <div style={{fontSize:12,color:T.text3,marginBottom:8,lineHeight:1.4}}>{task.desc}</div>}

      {/* Meta */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
        {task.tags?.map(tag => (
          <span key={tag} style={{background:T.bg3,border:`1px solid ${T.border}`,borderRadius:6,padding:"2px 7px",fontSize:10,color:T.text3}}>#{tag}</span>
        ))}
      </div>

      {/* Bottom row */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <span style={{fontSize:11,color:sc.color}}>{sc.icon}</span>
            <span style={{fontSize:11,color:sc.color,fontWeight:500}}>{sc.label}</span>
          </div>
          <span style={{color:T.border}}>·</span>
          <div style={{fontSize:11,color:isOverdue?T.red:T.text3}}>
            {isOverdue?"⚠ ":""}{fmtDate(task.dueDate)}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <div style={{background:`${T.accent}22`,border:`1px solid ${T.accent}33`,borderRadius:99,padding:"1px 7px",fontSize:10,color:T.accent2,fontWeight:600}}>+{task.xpReward} XP</div>
        </div>
      </div>

      {/* Actions */}
      {isMyTask && task.status !== "completed" && (
        <div style={{display:"flex",gap:6,marginTop:10,paddingTop:10,borderTop:`1px solid ${T.border}`}}>
          {task.status === "pending" && (
            <button onClick={()=>onUpdate(task.id,"in_progress")} style={{flex:1,padding:"7px",borderRadius:9,background:T.bg3,border:`1px solid ${T.border}`,fontSize:12,color:T.text2,fontWeight:500}}>
              Iniciar
            </button>
          )}
          <button onClick={()=>onUpdate(task.id,"completed")} style={{
            flex:2,padding:"7px",borderRadius:9,
            background:`${T.green}22`,border:`1px solid ${T.green}44`,
            fontSize:12,color:T.green,fontWeight:600,
          }}>
            ✓ Completar (+{task.xpReward} XP)
          </button>
          <button onClick={()=>setModal({type:"editTask",data:task})} style={{width:32,height:32,borderRadius:9,background:T.bg3,border:`1px solid ${T.border}`,fontSize:14,flexShrink:0}}>⋯</button>
        </div>
      )}
      {!isMyTask && (
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:10,paddingTop:10,borderTop:`1px solid ${T.border}`}}>
          <Avatar user={assignedUser} size={22}/>
          <span style={{fontSize:11,color:T.text3}}>Asignada a <span style={{color:T.text2}}>{assignedUser?.name}</span></span>
          <button onClick={()=>setModal({type:"editTask",data:task})} style={{marginLeft:"auto",padding:"4px 10px",borderRadius:8,background:T.bg3,border:`1px solid ${T.border}`,fontSize:11,color:T.text2}}>
            Editar
          </button>
        </div>
      )}
    </div>
  );
}

                borderRadius:14,padding:"12px",
                opacity:earned?1:.6,
                animation: earned ? "badgePop .4s ease-out" : "none",
              }}>
                <div style={{fontSize:28,marginBottom:6}}>{ach.icon}</div>
                <div style={{fontSize:13,fontWeight:600,color:earned?T.accent2:T.text}}>{ach.name}</div>
                <div style={{fontSize:11,color:T.text3,marginTop:2,lineHeight:1.3}}>{ach.desc}</div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
                  <span style={{fontSize:11,color:T.accent2,fontFamily:"'DM Mono',monospace"}}>+{ach.xpReward} XP</span>
                  {earned && <span style={{fontSize:10,color:T.green,fontWeight:600}}>✓ Obtenido</span>}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ══ ADMIN AREAS (Áreas de Trabajo) ══ */
function AdminAreas({areas, setAreas, users, setUsers, addToast, askConfirm}) {
  const [newArea, setNewArea] = useState("");
  const [editIdx, setEditIdx] = useState(null);
  const [editVal, setEditVal] = useState("");

  function addArea() {
    const trimmed = newArea.trim();
    if (!trimmed) return;
    if (areas.includes(trimmed)) { addToast("Ya existe","Ese nombre de área ya existe","⚠️",T.orange); return; }
    setAreas(a => [...a, trimmed]);
    setNewArea("");
    addToast("Área creada", trimmed, "🏢", T.green);
  }

  function startEdit(idx) {
    setEditIdx(idx);
    setEditVal(areas[idx]);
  }

  function saveEdit() {
    const trimmed = editVal.trim();
    if (!trimmed || editIdx === null) return;
    const oldName = areas[editIdx];
    setAreas(a => a.map((x,i) => i===editIdx ? trimmed : x));
    // Update all users with this area
    setUsers(us => us.map(u => u.dept===oldName ? {...u, dept:trimmed} : u));
    addToast("Área actualizada", `"${oldName}" → "${trimmed}"`, "✏️", T.blue);
    setEditIdx(null);
  }

  function deleteArea(idx) {
    const name = areas[idx];
    const usersInArea = users.filter(u => u.dept===name).length;
    if (usersInArea > 0) {
      addToast("No se puede eliminar", `Hay ${usersInArea} usuario(s) en "${name}". Reasígnalos primero.`, "⚠️", T.red);
      return;
    }
    const doDelete = () => {
      setAreas(a => a.filter((_,i) => i!==idx));
      addToast("Área eliminada", name, "🗑️", T.red);
    };
    if (askConfirm) askConfirm(`¿Eliminar el área "${name}"?`, doDelete);
    else if (window.confirm(`¿Eliminar el área "${name}"?`)) doDelete();
  }

  return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {/* Header info */}
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px"}}>
        <div style={{fontSize:14,fontWeight:700,color:T.text,marginBottom:4}}>🏢 Áreas de Trabajo</div>
        <div style={{fontSize:12,color:T.text3,lineHeight:1.5}}>
          Gestiona las áreas de la empresa. Al renombrar un área, todos los usuarios asignados se actualizan automáticamente.
        </div>
      </div>

      {/* Add new area */}
      <div style={{background:T.surface,border:`1px dashed ${T.green}55`,borderRadius:14,padding:"14px"}}>
        <div style={{fontSize:11,fontWeight:600,color:T.text2,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Nueva Área</div>
        <div style={{display:"flex",gap:8}}>
          <input
            value={newArea}
            onChange={e=>setNewArea(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&addArea()}
            placeholder="Ej: Diseño, Legal, Soporte..."
            style={{flex:1,background:T.bg3,border:`1px solid ${T.border2}`,borderRadius:12,padding:"11px 14px",fontSize:14,color:T.text}}
          />
          <button onClick={addArea} style={{
            padding:"11px 18px",borderRadius:12,fontSize:14,fontWeight:600,
            background:`linear-gradient(135deg,${T.green},${T.green}cc)`,
            border:"none",color:"#fff",
            boxShadow:`0 4px 12px ${T.green}44`,flexShrink:0,
          }}>➕ Agregar</button>
        </div>
      </div>

      {/* Areas list */}
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {areas.map((area, idx) => {
          const count = users.filter(u=>u.dept===area).length;
          const isEditing = editIdx === idx;
          return (
            <div key={idx} style={{
              background:T.surface,border:`1px solid ${isEditing?T.accent:T.border}`,
              borderRadius:14,padding:"12px 14px",
              borderLeft:`3px solid ${isEditing?T.accent:T.border2}`,
              transition:"all .15s",
            }}>
              {isEditing ? (
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <input
                    value={editVal}
                    onChange={e=>setEditVal(e.target.value)}
                    onKeyDown={e=>{ if(e.key==="Enter")saveEdit(); if(e.key==="Escape")setEditIdx(null); }}
                    autoFocus
                    style={{flex:1,background:T.bg3,border:`1px solid ${T.accent}`,borderRadius:10,padding:"8px 12px",fontSize:14,color:T.text,fontWeight:600}}
                  />
                  <button onClick={saveEdit} style={{padding:"8px 14px",borderRadius:10,background:`${T.accent}22`,border:`1px solid ${T.accent}44`,fontSize:13,color:T.accent2,fontWeight:600}}>✓ Guardar</button>
                  <button onClick={()=>setEditIdx(null)} style={{padding:"8px 12px",borderRadius:10,background:T.bg3,border:`1px solid ${T.border}`,fontSize:13,color:T.text3}}>✕</button>
                </div>
              ) : (
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:36,height:36,borderRadius:10,background:`${T.accent}18`,border:`1px solid ${T.accent}22`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>🏢</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:600,color:T.text}}>{area}</div>
                    <div style={{fontSize:11,color:T.text3,marginTop:1}}>
                      {count === 0 ? "Sin usuarios asignados" : `${count} usuario${count>1?"s":""} asignado${count>1?"s":""}`}
                    </div>
                  </div>
                  {count > 0 && (
                    <span style={{background:`${T.accent}18`,border:`1px solid ${T.accent}33`,borderRadius:99,padding:"2px 9px",fontSize:11,color:T.accent2,fontWeight:600,flexShrink:0}}>
                      👥 {count}
                    </span>
                  )}
                  <div style={{display:"flex",gap:6,flexShrink:0}}>
                    <button onClick={()=>startEdit(idx)} style={{width:32,height:32,borderRadius:9,background:T.bg3,border:`1px solid ${T.border}`,fontSize:15,color:T.text2,display:"flex",alignItems:"center",justifyContent:"center"}}>✏️</button>
                    <button onClick={()=>deleteArea(idx)} style={{width:32,height:32,borderRadius:9,background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.25)",fontSize:15,color:T.red,display:"flex",alignItems:"center",justifyContent:"center"}}>🗑️</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {areas.length === 0 && (
        <div style={{textAlign:"center",padding:"32px",color:T.text3,fontSize:13}}>
          No hay áreas creadas. Agrega la primera arriba.
        </div>
      )}
    </div>
  );
}


/* ══ ORG CHART VIEW (shared) ══ */
function OrgChartView({users, me, onChat, onProfile, readonly}) {
  // Find roots (no boss, or boss not in users)
  const allIds = users.map(u=>u.id);
  const roots = users.filter(u => !u.reportsTo || !allIds.includes(u.reportsTo));

  function OrgNode({user, depth}) {
    const children = users.filter(u => u.reportsTo === user.id);
    const lv = getLv(user.xp||0);
    const isMe = user.id === me?.id || user.id === "me";
    return (
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:0}}>
        {/* Node card */}
        <div style={{
          background: isMe ? `${T.accent}18` : T.surface,
          border: `2px solid ${isMe ? T.accent : user.color+"66"}`,
          borderRadius:14,padding:"10px 14px",
          display:"flex",flexDirection:"column",alignItems:"center",gap:4,
          minWidth:110,maxWidth:130,
          boxShadow: isMe ? `0 0 20px ${T.accent}33` : "0 2px 8px rgba(0,0,0,.3)",
          position:"relative",
          cursor: readonly ? "default" : "pointer",
        }}>
          {/* Avatar */}
          <div style={{
            width:44,height:44,borderRadius:"50%",
            background:`linear-gradient(135deg,${user.color}cc,${user.color}55)`,
            border:`2px solid ${user.color}66`,
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:16,fontWeight:700,color:"#fff",
            position:"relative",
          }}>
            {user.avatar}
            <div style={{
              position:"absolute",bottom:0,right:0,width:12,height:12,borderRadius:"50%",
              background: user.online ? T.green : T.text3,
              border:`2px solid ${T.surface}`,
            }}/>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:11,fontWeight:700,color:isMe?T.accent2:T.text,lineHeight:1.2}}>{user.name.split(" ")[0]}</div>
            <div style={{fontSize:9,color:T.text3,marginTop:1}}>{user.name.split(" ").slice(1).join(" ")}</div>
          </div>
          <div style={{
            background:`${user.color}22`,border:`1px solid ${user.color}44`,
            borderRadius:99,padding:"1px 7px",fontSize:9,color:user.color,fontWeight:600,
          }}>{user.role}</div>
          <div style={{fontSize:9,color:T.text3,fontWeight:500,textAlign:"center"}}>{user.dept}</div>
          {/* XP badge */}
          <div style={{fontSize:9,color:T.accent2,fontFamily:"'DM Mono',monospace"}}>
            {lv.icon||"⭐"} LV{lv.l}
          </div>
          {/* canAssignUp badge */}
          {user.canAssignUp && (
            <div style={{
              position:"absolute",top:-6,right:-6,
              background:T.orange,border:`2px solid ${T.surface}`,
              borderRadius:99,fontSize:8,padding:"1px 5px",color:"#fff",fontWeight:700,
            }}>↑</div>
          )}
          {/* Action buttons */}
          {!readonly && (
            <div style={{display:"flex",gap:4,marginTop:2}}>
              {onChat && <button onClick={()=>onChat(user.id)} style={{padding:"3px 7px",borderRadius:7,background:`${T.accent}22`,border:`1px solid ${T.accent}44`,fontSize:10,color:T.accent2,cursor:"pointer"}}>💬</button>}
              {onProfile && <button onClick={()=>onProfile(user)} style={{padding:"3px 7px",borderRadius:7,background:T.bg3,border:`1px solid ${T.border}`,fontSize:10,color:T.text2,cursor:"pointer"}}>👤</button>}
            </div>
          )}
        </div>

        {/* Children */}
        {children.length > 0 && (
          <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
            {/* Vertical line down */}
            <div style={{width:2,height:20,background:T.border2}}/>
            {children.length > 1 ? (
              <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
                {/* Horizontal connector */}
                <div style={{position:"relative",display:"flex",alignItems:"flex-start",gap:0}}>
                  {children.map((child, ci) => (
                    <div key={child.id} style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"0 8px"}}>
                      <div style={{width:2,height:16,background:T.border2}}/>
                      <OrgNode user={child} depth={depth+1}/>
                    </div>
                  ))}
                  {/* Top horizontal bar */}
                  <div style={{
                    position:"absolute",top:0,
                    left:"calc(50% - " + (children.length*60) + "px)",
                    width: (children.length*120) + "px",
                    height:2,background:T.border2,
                  }}/>
                </div>
              </div>
            ) : (
              <OrgNode user={children[0]} depth={depth+1}/>
            )}
          </div>
        )}
      </div>
    );
  }

  return (
    <div style={{overflowX:"auto",paddingBottom:16}}>
      {/* Legend */}
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:16,padding:"8px 12px",background:T.surface,borderRadius:12,border:`1px solid ${T.border}`}}>
        <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:T.text3}}><div style={{width:8,height:8,borderRadius:"50%",background:T.green}}/> En línea</div>
        <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:T.text3}}><div style={{background:T.orange,borderRadius:99,padding:"0px 5px",fontSize:9,color:"#fff",fontWeight:700}}>↑</div> Puede asignar hacia arriba</div>
        <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:T.text3}}><div style={{width:16,height:2,background:T.border2}}/> Línea de reporte</div>
      </div>
      <div style={{display:"flex",gap:24,flexWrap:"wrap",justifyContent:"center"}}>
        {roots.map(r => <OrgNode key={r.id} user={r} depth={0}/>)}
      </div>
    </div>
  );
}

/* ══ ADMIN ORG CHART ══ */
function AdminOrgChart({users, setUsers, addToast, me}) {
  const [editUser, setEditUser] = useState(null);
  const [form, setForm] = useState({reportsTo:"", canAssignUp:false});

  function openEdit(u) {
    setEditUser(u);
    setForm({reportsTo:u.reportsTo||"", canAssignUp:u.canAssignUp||false});
  }

  function saveRelation() {
    if (!editUser) return;
    setUsers(us => us.map(u => u.id!==editUser.id ? u : {
      ...u,
      reportsTo: form.reportsTo||null,
      canAssignUp: form.canAssignUp,
    }));
    addToast("Jerarquía actualizada", `${editUser.name} actualizado`, "🌳", T.accent);
    setEditUser(null);
  }

  // Get possible bosses (not self, not already reports to editUser to avoid circular)
  function getPossibleBosses(u) {
    if (!u) return users;
    return users.filter(x => x.id !== u.id);
  }

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px"}}>
        <div style={{fontSize:14,fontWeight:700,color:T.text,marginBottom:4}}>🌳 Organigrama de la Empresa</div>
        <div style={{fontSize:12,color:T.text3,lineHeight:1.5}}>

function AdminLevels({levels, setLevels, addToast, users, onAnnualReset, askConfirm}) {
  const [editing, setEditing] = useState(levels.map(l=>({...l})));

  function update(idx, key, val) {
    setEditing(eds => eds.map((e,i) => i!==idx ? e : {...e, [key]: val}));
  }

  function save() {
    // Sort by xp and re-number
    const sorted = [...editing].sort((a,b)=>a.xp-b.xp).map((l,i)=>({...l,l:i+1}));
    setLevels(sorted);
    addToast("Niveles guardados","Configuración de niveles actualizada","🎖️",T.accent);
  }

  function reset() {
    setEditing(DEFAULT_LEVELS.map(l=>({...l})));
    setLevels(DEFAULT_LEVELS);
    addToast("Niveles restablecidos","Valores por defecto restaurados","↩️",T.text2);
  }

  const LEVEL_COLORS = ["#9ca3af","#60a5fa","#34d399","#a78bfa","#f59e0b","#f97316","#ec4899","#ef4444","#6c63ff","#ffd700"];

  return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:16,padding:"14px",marginBottom:4}}>
        <div style={{fontSize:14,fontWeight:600,color:T.text,marginBottom:4}}>🎖️ Configuración de Niveles</div>
        <div style={{fontSize:12,color:T.text3,lineHeight:1.5}}>
          Define el nombre y los XP requeridos para subir de nivel. Los cambios afectan a todos los usuarios en tiempo real.
        </div>
      </div>

      {editing.map((lv, idx) => {
        // find how many users are at this level
        const usersAtLevel = users.filter(u => getLv(u.xp).l === lv.l).length;
        return (
          <div key={idx} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,padding:"12px",borderLeft:`3px solid ${LEVEL_COLORS[idx]||T.accent}`}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <div style={{
                width:36,height:36,borderRadius:10,flexShrink:0,
                background:`${LEVEL_COLORS[idx]||T.accent}22`,
                border:`1px solid ${LEVEL_COLORS[idx]||T.accent}44`,
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:13,fontWeight:700,color:LEVEL_COLORS[idx]||T.accent,
                fontFamily:"'DM Mono',monospace",
              }}>LV{idx+1}</div>
              <input
                value={lv.t}
                onChange={e=>update(idx,"t",e.target.value)}
                style={{flex:1,background:T.bg3,border:`1px solid ${T.border2}`,borderRadius:10,padding:"7px 12px",fontSize:14,fontWeight:600,color:T.text}}
                placeholder="Nombre del nivel"
              />
              <input
                value={lv.icon||"⭐"}
                onChange={e=>update(idx,"icon",e.target.value)}
                style={{width:44,background:T.bg3,border:`1px solid ${T.border2}`,borderRadius:10,padding:"7px",fontSize:22,textAlign:"center",color:T.text}}
                title="Emoji del nivel"
              />
              {usersAtLevel > 0 && (
                <span style={{fontSize:11,color:T.text3,background:T.bg3,border:`1px solid ${T.border}`,borderRadius:99,padding:"2px 8px",flexShrink:0}}>
                  👥 {usersAtLevel}
                </span>
              )}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:12,color:T.text3,flexShrink:0}}>XP requerido:</span>
              <input
                value={lv.xp}
                onChange={e=>update(idx,"xp",parseInt(e.target.value)||0)}
                type="number"
                min={0}
                disabled={idx===0}
                style={{flex:1,background:idx===0?T.bg:T.bg3,border:`1px solid ${T.border2}`,borderRadius:10,padding:"7px 12px",fontSize:15,color:T.accent2,fontFamily:"'DM Mono',monospace",fontWeight:600,opacity:idx===0?0.5:1}}
              />
              <span style={{fontSize:12,color:T.text3,flexShrink:0}}>XP</span>
            </div>
            {idx === 0 && <div style={{fontSize:11,color:T.text3,marginTop:4}}>El nivel 1 siempre empieza en 0 XP</div>}
          </div>
        );
      })}

      <button onClick={save} style={{
        width:"100%",padding:"13px",borderRadius:14,fontSize:14,fontWeight:600,
        background:`linear-gradient(135deg,${T.accent},${T.accent3})`,
        border:"none",color:"#fff",
        boxShadow:`0 6px 20px ${T.accent}44`,
      }}>💾 Guardar niveles</button>
      <button onClick={reset} style={{
        width:"100%",padding:"11px",borderRadius:12,fontSize:13,fontWeight:500,
        background:"transparent",border:`1px solid ${T.border2}`,color:T.text3,
      }}>↩️ Restablecer valores por defecto</button>

      <div style={{background:"rgba(239,68,68,.06)",border:"1px solid rgba(239,68,68,.25)",borderRadius:14,padding:"14px",marginTop:4}}>
        <div style={{fontSize:13,fontWeight:700,color:"#ef4444",marginBottom:6}}>🔄 Reset Anual de XP</div>
        <div style={{fontSize:12,color:T.text3,lineHeight:1.6,marginBottom:12}}>
          Archiva el nivel máximo del año en el historial de cada usuario y reinicia el XP a 0. Irreversible.
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
          {users.slice(0,5).map(u=>{
            const lv=getLv(u.xp);
            return <div key={u.id} style={{background:T.bg3,border:`1px solid ${T.border}`,borderRadius:8,padding:"5px 8px",display:"flex",alignItems:"center",gap:5}}>
              <span style={{fontSize:14}}>{lv.icon||"⭐"}</span>
              <div><div style={{fontSize:10,fontWeight:600,color:T.text}}>{u.name.split(" ")[0]}</div><div style={{fontSize:9,color:T.text3}}>{lv.t}</div></div>
            </div>;
          })}
        </div>
        <button onClick={()=>{
              const doReset = () => onAnnualReset();
              if(askConfirm) askConfirm("Se archivará el nivel actual de todos los usuarios y su XP volverá a 0. Esta acción es irreversible.", doReset, true);
              else if(window.confirm("¿Confirmas el reset anual?")) doReset();
            }} style={{
          width:"100%",padding:"11px",borderRadius:12,fontSize:13,fontWeight:600,
          background:"rgba(239,68,68,.15)",border:"1px solid rgba(239,68,68,.4)",color:"#ef4444",
        }}>🔄 Ejecutar Reset Anual {new Date().getFullYear()}</button>
      </div>

      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px",marginTop:4}}>
        <div style={{fontSize:13,fontWeight:600,color:T.text,marginBottom:10}}>Vista previa del árbol de niveles</div>
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          {levels.map((lv,i) => (
            <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"5px 0",borderBottom:`1px solid ${T.border}`}}>
              <div style={{width:32,height:32,borderRadius:8,background:`${LEVEL_COLORS[i]||T.accent}22`,border:`1px solid ${LEVEL_COLORS[i]||T.accent}33`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>
                {lv.icon||"⭐"}
              </div>
              <div style={{flex:1}}><span style={{fontSize:13,fontWeight:600,color:T.text}}>{lv.t}</span><span style={{fontSize:10,color:T.text3,marginLeft:6}}>LV{lv.l}</span></div>
              <span style={{fontSize:12,color:T.text3,fontFamily:"'DM Mono',monospace"}}>{lv.xp} XP</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function AdminStats({users, tasks}) {
  const totalXP = users.reduce((a,u)=>a+u.xp,0);
  const completed = tasks.filter(t=>t.status==="completed").length;

  const sorted = [...users].sort((a,b)=>b.xp-a.xp);

  return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>

          <div key={l} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px"}}>
            <div style={{fontSize:22}}>{i}</div>
            <div style={{fontSize:22,fontWeight:700,color:c,fontFamily:"'DM Mono',monospace"}}>{v}</div>

      <div style={{fontSize:14,fontWeight:600,color:T.text}}>🏆 Ranking XP</div>
      {sorted.map((u,i)=>(
        <div key={u.id} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:12,padding:"10px 12px",display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:28,textAlign:"center",fontSize:16,fontWeight:700,color:i===0?T.orange:i===1?"#ccc":i===2?"#cd7f32":T.text3}}>

        </div>
      ))}
    </div>
  );
}

/* ══ MODAL LAYER ══ */
function ModalLayer({modal, setModal, tasks, setTasks, users, setUsers, me, setMe, achievements, setAchievements, addToast, groups, setGroups, announcements, setAnnouncements}) {
  const close = () => setModal(null);

  const overlayStyle = {
    position:"fixed",inset:0,background:"rgba(0,0,0,.7)",zIndex:1000,
    display:"flex",flexDirection:"column",justifyContent:"flex-end",
    animation:"fadeIn .15s ease-out",
  };
  const sheetStyle = {
    background:T.surface,borderRadius:"24px 24px 0 0",
    maxHeight:"85vh",display:"flex",flexDirection:"column",
    animation:"slideUp .25s ease-out",
  };

  return (
    <div style={overlayStyle} onClick={e=>{if(e.target===e.currentTarget)close();}}>
      <div style={sheetStyle}>
        {/* Handle */}
        <div style={{display:"flex",justifyContent:"center",padding:"10px 0 4px"}}>
          <div style={{width:40,height:4,borderRadius:99,background:T.border2}}/>
        </div>

        {/* CONTENT */}
        <div className="scroll" style={{overflowY:"auto",padding:"0 20px 32px",flex:1}}>
          {modal?.type === "newTask" && <NewTaskModal close={close} tasks={tasks} setTasks={setTasks} users={users} me={me} addToast={addToast}/>}
          {modal?.type === "editTask" && <EditTaskModal close={close} task={modal.data} setTasks={setTasks} users={users} addToast={addToast}/>}
          {modal?.type === "assignTask" && <AssignTaskModal close={close} tasks={tasks} setTasks={setTasks} users={users} me={me} addToast={addToast} preAssign={modal.data?.assignTo}/>}
          {modal?.type === "newAchievement" && <NewAchievementModal close={close} setAchievements={setAchievements} addToast={addToast}/>}
          {modal?.type === "editAchievement" && <EditAchievementModal close={close} ach={modal.data} setAchievements={setAchievements} addToast={addToast}/>}
          {modal?.type === "grantAchievement" && <GrantAchievementModal close={close} achievements={achievements} users={users} setUsers={setUsers} addToast={addToast}/>}
          {modal?.type === "newGroup" && <NewGroupModal close={close} users={users} setGroups={setGroups} addToast={addToast}/>}
          {modal?.type === "newAnnouncement" && <NewAnnouncementModal close={close} setAnnouncements={setAnnouncements} me={me} addToast={addToast}/>}
          {modal?.type === "profile" && <ProfileModal close={close} user={modal.data} me={me} setMe={setMe}/>}

/* GRANT ACHIEVEMENT */
function GrantAchievementModal({close, achievements, users, setUsers, addToast}) {
  const [selUser, setSelUser] = useState(USERS[0].id);
  const [selAch, setSelAch] = useState(achievements[0]?.id||"");

  function grant() {
    const u = users.find(x=>x.id===selUser)||USERS.find(x=>x.id===selUser);
    const ach = achievements.find(x=>x.id===selAch);
    if (!u || !ach) return;
    setUsers(us=>us.map(x=>x.id!==selUser?x:{...x,xp:x.xp+ach.xpReward,badges:[...new Set([...x.badges,ach.icon])]}));
    addToast(`🏅 Logro otorgado`,`${ach.name} → ${u.name} (+${ach.xpReward} XP)`,"🎉",T.orange);
    playSound("achievement");
    close();
  }

  return (
    <>
      <ModalHeader title="Otorgar Logro Manual" icon="🏅"/>
      <FormField label="Empleado">
        <select value={selUser} onChange={e=>setSelUser(e.target.value)} style={{width:"100%",background:T.bg3,border:`1px solid ${T.border2}`,borderRadius:12,padding:"11px 14px",fontSize:14,color:T.text}}>
          {USERS.map(u=><option key={u.id} value={u.id}>{u.name} · {u.dept}</option>)}

      </FormField>
      <FormField label="Logro">
        <select value={selAch} onChange={e=>setSelAch(e.target.value)} style={{width:"100%",background:T.bg3,border:`1px solid ${T.border2}`,borderRadius:12,padding:"11px 14px",fontSize:14,color:T.text}}>
          {achievements.map(a=><option key={a.id} value={a.id}>{a.icon} {a.name} · +{a.xpReward} XP</option>)}
        </select>
      </FormField>
      {selAch && (() => {
        const ach = achievements.find(x=>x.id===selAch);
        return ach ? (
          <div style={{background:`${T.orange}12`,border:`1px solid ${T.orange}33`,borderRadius:12,padding:"12px",marginBottom:8}}>
            <div style={{fontSize:28,marginBottom:6}}>{ach.icon}</div>
            <div style={{fontSize:14,fontWeight:600,color:T.text}}>{ach.name}</div>
            <div style={{fontSize:12,color:T.text3,marginTop:2}}>{ach.desc}</div>
            <div style={{fontSize:13,color:T.accent2,fontFamily:"'DM Mono',monospace",marginTop:6,fontWeight:600}}>+{ach.xpReward} XP</div>
          </div>
        ) : null;
      })()}
      <PrimaryBtn onClick={grant} color={T.orange}>🏅 Otorgar Logro</PrimaryBtn>
    </>
  );
}

}


/* CREATE USER */
function CreateUserModal({close, setUsers, addToast}) {
  const [form, setForm] = useState({name:"",username:"",password:"",confirmPass:"",role:"Employee",dept:"",color:"#6c63ff"});
  const [showPass, setShowPass] = useState(false);
  const [error, setError] = useState("");
  const upd = (k,v) => setForm(f=>({...f,[k]:v}));

  const COLORS = ["#6c63ff","#22c55e","#f59e0b","#ec4899","#3b82f6","#14b8a6","#f97316","#ef4444","#a78bfa","#fb923c"];
  const DEPTS = window.__BINET_AREAS__ || ["Tecnología","Marketing","Ventas","RRHH","Finanzas","Operaciones","Legal","Dirección"];

  async function save() {
    setError("");
    if (!form.name.trim()) { setError("El nombre es requerido"); return; }
    if (!form.username.trim()) { setError("El usuario de acceso es requerido"); return; }
    if (!form.password) { setError("La contraseña es requerida"); return; }
    if (form.password !== form.confirmPass) { setError("Las contraseñas no coinciden"); return; }
    if (form.password.length < 6) { setError("La contraseña debe tener al menos 6 caracteres para Firebase"); return; }

    try {
      let newUser;
      if (FIREBASE_READY) {
        newUser = await firebaseCreateEmployee(form);
      } else {
        const taken = AUTH_REGISTRY.some(a=>a.username.toLowerCase()===form.username.toLowerCase().trim());
        if (taken) { setError("Ese nombre de usuario ya está en uso"); return; }
        const newId = "u_"+Date.now();
        newUser = {
          id: newId,
          name: form.name.trim(),
          username: form.username.trim().toLowerCase(),
          role: form.role,
          dept: form.dept||"General",
          avatar: initialsFromName(form.name),
          color: form.color,
          online: false,
          xp: 0,
          level: 1,
          badges: [],
          yearHistory: [],
        };
        AUTH_REGISTRY = [...AUTH_REGISTRY, {id:"auth_"+newId,username:newUser.username,password:form.password,employeeId:newId}];
      }
      setUsers(us=>[...us.filter(u=>u.id!==newUser.id), newUser]);
      addToast("Usuario creado", `${newUser.name} · @${newUser.username}`, "✅", T.green);
      close();
    } catch(err) {
      setError(err?.message || "No se pudo crear el usuario");
    }
  }

  return (
    <>
      <ModalHeader title="Crear Nuevo Usuario" icon="➕"/>

      <FormField label="Nombre completo del empleado">
        <StyledInput value={form.name} onChange={e=>upd("name",e.target.value)} placeholder="Ej: María González"/>
      </FormField>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <FormField label="Rol">
          <select value={form.role} onChange={e=>upd("role",e.target.value)} style={{width:"100%",background:T.bg3,border:`1px solid ${T.border2}`,borderRadius:12,padding:"11px 14px",fontSize:14,color:T.text}}>
            {["Admin","Manager","Employee","Viewer"].map(r=><option key={r}>{r}</option>)}
          </select>
        </FormField>
        <FormField label="Área de Trabajo">
          <select value={form.dept} onChange={e=>upd("dept",e.target.value)} style={{width:"100%",background:T.bg3,border:`1px solid ${T.border2}`,borderRadius:12,padding:"11px 14px",fontSize:14,color:T.text}}>
            <option value="">Seleccionar...</option>
            {DEPTS.map(d=><option key={d}>{d}</option>)}
          </select>
        </FormField>
      </div>

      <FormField label="Color de avatar">
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {COLORS.map(c=>(
            <button key={c} onClick={()=>upd("color",c)} style={{
              width:32,height:32,borderRadius:"50%",background:c,border:`3px solid ${form.color===c?"#fff":c+"44"}`,
              flexShrink:0,transition:"all .12s",
              boxShadow:form.color===c?`0 0 0 3px ${T.bg},0 0 0 5px ${c}`:"none",
            }}/>
          ))}
        </div>
      </FormField>

      {/* Preview avatar */}
      {form.name && (
        <div style={{display:"flex",alignItems:"center",gap:12,background:T.bg3,border:`1px solid ${T.border}`,borderRadius:12,padding:"10px 14px",marginBottom:6}}>
          <div style={{width:40,height:40,borderRadius:"50%",background:`linear-gradient(135deg,${form.color}cc,${form.color}66)`,border:`2px solid ${form.color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:"#fff"}}>
            {form.name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2)}
          </div>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:T.text}}>{form.name}</div>
            <div style={{fontSize:11,color:T.text3}}>{form.role}{form.dept?` · ${form.dept}`:""}</div>
          </div>
        </div>
      )}

      <div style={{background:T.bg3,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px",marginBottom:6}}>
        <div style={{fontSize:12,fontWeight:600,color:T.text2,marginBottom:12,textTransform:"uppercase",letterSpacing:1}}>🔐 Credenciales de acceso</div>
        <FormField label="Nombre de usuario (para login)">
          <div style={{position:"relative"}}>
            <div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:14,color:T.text3,fontFamily:"'DM Mono'"}}>@</div>
            <input value={form.username} onChange={e=>upd("username",e.target.value.replace(/\s/g,"").toLowerCase())} placeholder="usuario.apellido" style={{width:"100%",background:T.bg4,border:`1px solid ${T.border2}`,borderRadius:12,padding:"11px 14px 11px 28px",fontSize:14,color:T.text,fontFamily:"'DM Mono',monospace"}}/>
          </div>
        </FormField>
        <FormField label="Contraseña">
          <div style={{position:"relative"}}>
            <input value={form.password} onChange={e=>upd("password",e.target.value)} type={showPass?"text":"password"} placeholder="mínimo 6 caracteres" style={{width:"100%",background:T.bg4,border:`1px solid ${T.border2}`,borderRadius:12,padding:"11px 40px 11px 14px",fontSize:14,color:T.text,letterSpacing:"1px"}}/>
            <button onClick={()=>setShowPass(s=>!s)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",fontSize:14,color:T.text3,cursor:"pointer"}}>{showPass?"🙈":"👁️"}</button>
          </div>
        </FormField>
        <FormField label="Confirmar contraseña">
          <input value={form.confirmPass} onChange={e=>upd("confirmPass",e.target.value)} type={showPass?"text":"password"} placeholder="repite la contraseña" style={{width:"100%",background:T.bg4,border:`1px solid ${form.confirmPass&&form.confirmPass!==form.password?T.red:T.border2}`,borderRadius:12,padding:"11px 14px",fontSize:14,color:T.text,letterSpacing:"1px"}}/>
          {form.confirmPass && form.confirmPass!==form.password && <div style={{fontSize:11,color:T.red,marginTop:4}}>Las contraseñas no coinciden</div>}
        </FormField>
      </div>

      {error && (
        <div style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.3)",borderRadius:10,padding:"9px 12px",marginBottom:8,display:"flex",gap:8,alignItems:"center"}}>
          <span>⚠️</span><span style={{fontSize:12,color:T.red}}>{error}</span>
        </div>
      )}

      <PrimaryBtn onClick={save} color={T.green}>✅ Crear Usuario</PrimaryBtn>
    </>
  );
}

/* EDIT USER */
function EditUserModal({close, user, setUsers, addToast}) {
  const [form, setForm] = useState({...user});
  const upd = (k,v) => setForm(f=>({...f,[k]:v}));
  const authEntry = AUTH_REGISTRY.find(a=>a.employeeId===user.id);
  const [newPass, setNewPass] = useState("");
  const [showPass, setShowPass] = useState(false);

  async function save() {
    const updated = {...form, username:cleanUsername(form.username||authEntry?.username||""), updatedAt: FIREBASE_READY ? firebase.firestore.FieldValue.serverTimestamp() : Date.now()};
    setUsers(us=>us.map(u=>u.id!==user.id?u:updated));
    try {
      if (FIREBASE_READY) {
        await firebaseUpdateEmployee(user.id, updated);
        // Nota: cambiar contraseña de otro usuario desde el cliente requiere Cloud Function/Admin SDK.
      } else if (authEntry) {
        AUTH_REGISTRY = AUTH_REGISTRY.map(a=>a.employeeId!==user.id?a:{...a, username: updated.username||a.username, password: newPass.trim()||a.password});
      }
      addToast("Usuario actualizado",form.name,"👤",T.blue);
      close();
    } catch(e) {
      addToast("No se guardó en Firebase", e.message || "Error de permisos", "⚠️", T.red);
    }
  }

  return (
    <>
      <ModalHeader title="Editar Usuario" icon="✏️"/>
      <FormField label="Nombre completo"><StyledInput value={form.name} onChange={e=>upd("name",e.target.value)}/></FormField>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <FormField label="Rol">
          <select value={form.role} onChange={e=>upd("role",e.target.value)} style={{width:"100%",background:T.bg3,border:`1px solid ${T.border2}`,borderRadius:12,padding:"11px 14px",fontSize:14,color:T.text}}>
            {["Admin","Manager","Employee","Viewer"].map(r=><option key={r}>{r}</option>)}
          </select>
        </FormField>
        <FormField label="Área de Trabajo">
          <select value={form.dept||""} onChange={e=>upd("dept",e.target.value)}
            style={{width:"100%",background:T.bg3,border:`1px solid ${T.border2}`,borderRadius:12,padding:"11px 14px",fontSize:14,color:T.text}}>
            <option value="">— Sin área —</option>
            {(window.__BINET_AREAS__||["Tecnología","Marketing","Ventas","RRHH","Finanzas","Operaciones","Legal","Dirección"]).map(d=>(
              <option key={d} value={d}>{d}</option>
            ))}
          </select>
        </FormField>
      </div>
      <div style={{background:T.bg3,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px",marginBottom:14}}>
        <div style={{fontSize:12,fontWeight:600,color:T.text2,marginBottom:10,textTransform:"uppercase",letterSpacing:1}}>🔐 Credenciales de acceso</div>
        <FormField label="Usuario (login)">
          <div style={{position:"relative"}}>
            <div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:14,color:T.text3}}>@</div>
            <input value={form.username||authEntry?.username||""} onChange={e=>upd("username",e.target.value)} style={{width:"100%",background:T.bg4,border:`1px solid ${T.border2}`,borderRadius:12,padding:"11px 14px 11px 28px",fontSize:14,color:T.text,fontFamily:"'DM Mono',monospace"}}/>
          </div>
        </FormField>
        <FormField label="Nueva contraseña (dejar vacío para no cambiar)">
          <div style={{position:"relative"}}>
            <input value={newPass} onChange={e=>setNewPass(e.target.value)} type={showPass?"text":"password"} placeholder="••••••••" style={{width:"100%",background:T.bg4,border:`1px solid ${T.border2}`,borderRadius:12,padding:"11px 40px 11px 14px",fontSize:14,color:T.text,letterSpacing:"1px"}}/>
            <button onClick={()=>setShowPass(s=>!s)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",fontSize:14,color:T.text3,cursor:"pointer"}}>{showPass?"🙈":"👁️"}</button>
          </div>
        </FormField>
      </div>
      <FormField label="XP actual">
        <input value={form.xp} onChange={e=>upd("xp",parseInt(e.target.value)||0)} type="number" style={{width:"100%",background:T.bg3,border:`1px solid ${T.border2}`,borderRadius:12,padding:"11px 14px",fontSize:16,color:T.accent2,fontFamily:"'DM Mono',monospace"}}/>
      </FormField>
      <PrimaryBtn onClick={save} color={T.blue}>💾 Guardar cambios</PrimaryBtn>
    </>
  );
}


/* SOUND SETTINGS */

  return (
    <>
      <ModalHeader title="Sonidos de Notificación" icon="🔔"/>

          border:`1px solid ${soundEnabled?T.accent:T.border2}`,
          position:"relative",transition:"all .25s",flexShrink:0,cursor:"pointer",
        }}>
          <div style={{
            position:"absolute",top:3,
            left: soundEnabled ? 26 : 4,
            width:20,height:20,borderRadius:"50%",
            background:"#fff",
            transition:"left .25s",

      {/* Volume slider */}
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px",marginBottom:16,opacity:soundEnabled?1:0.4}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
          <span style={{fontSize:13,fontWeight:600,color:T.text}}>🔉 Volumen</span>
          <span style={{fontSize:13,color:T.accent2,fontFamily:"'DM Mono',monospace",fontWeight:600}}>{Math.round(soundVolume*100)}%</span>
        </div>
        <input
          type="range" min="0" max="100"
          value={Math.round(soundVolume*100)}
          disabled={!soundEnabled}
          onChange={e=>{ const v=parseInt(e.target.value)/100; setSoundVolume(v); window.__BINET_SOUND__.volume=v; }}
          onMouseUp={()=>playSound("notification")}
          onTouchEnd={()=>playSound("notification")}
          style={{width:"100%",accentColor:T.accent,cursor:soundEnabled?"pointer":"not-allowed"}}
        />
        <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
          <span style={{fontSize:10,color:T.text3}}>0%</span>
          <span style={{fontSize:10,color:T.text3}}>50%</span>
          <span style={{fontSize:10,color:T.text3}}>100%</span>
        </div>
      </div>

      {/* Sound preview list */}
      <div style={{marginBottom:8}}>
        <div style={{fontSize:12,fontWeight:600,color:T.text2,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Vista previa de sonidos</div>
        <div style={{display:"flex",flexDirection:"column",gap:6,opacity:soundEnabled?1:0.4}}>
          {SOUNDS.map(s=>(
            <div key={s.type} style={{
              display:"flex",alignItems:"center",gap:12,
              background:T.surface,border:`1px solid ${T.border}`,
              borderRadius:12,padding:"10px 14px",
            }}>
              <span style={{fontSize:20,flexShrink:0}}>{s.icon}</span>
              <span style={{flex:1,fontSize:13,color:T.text}}>{s.label}</span>
              <button
                disabled={!soundEnabled}
                onClick={()=>playSound(s.type)}
                style={{
                  padding:"5px 12px",borderRadius:9,fontSize:12,fontWeight:500,
                  background:soundEnabled?`${T.accent}22`:"transparent",
                  border:`1px solid ${soundEnabled?T.accent+"44":T.border}`,
                  color:soundEnabled?T.accent2:T.text3,
                  cursor:soundEnabled?"pointer":"not-allowed",
                  flexShrink:0,
                }}
              >▶ Probar</button>
            </div>
          ))}
        </div>
      </div>
    </>
  );
}

/* NOTIFICATIONS */
function NotificationsModal({close, tasks, me}) {
  const overdues = tasks.filter(t=>t.assignedTo==="me"&&t.status!=="completed"&&new Date(t.dueDate)<new Date());
  const pending = tasks.filter(t=>t.assignedTo==="me"&&t.status==="pending");
  const notifs = [
    ...overdues.map(t=>({id:t.id,icon:"⚠️",title:"Tarea vencida",desc:t.title,color:T.red,ts:t.dueDate})),
    ...pending.slice(0,3).map(t=>({id:"p"+t.id,icon:"📋",title:"Tarea pendiente",desc:t.title,color:T.orange,ts:t.dueDate})),
    {id:"sys1",icon:"👋",title:"¡Bienvenido a BINET!",desc:"Tu plataforma de comunicación interna",color:T.accent,ts:new Date().toISOString()},
  ];

  return (
    <>
      <ModalHeader title="Notificaciones" icon="🔔"/>
      {notifs.map(n=>(
        <div key={n.id} style={{display:"flex",gap:12,padding:"12px 0",borderBottom:`1px solid ${T.border}`}}>
          <div style={{width:40,height:40,borderRadius:12,background:`${n.color}18`,border:`1px solid ${n.color}33`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{n.icon}</div>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:T.text}}>{n.title}</div>
            <div style={{fontSize:12,color:T.text2,marginTop:2}}>{n.desc}</div>
          </div>
        </div>
      ))}
    </>
  );
}
