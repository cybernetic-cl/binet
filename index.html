<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>BINET Chat</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getDatabase,
  ref,
  set,
  get,
  push,
  update,
  onChildAdded,
  onValue,
  onDisconnect
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB0HVVTUhkswLkLORXLIZwOCoSLKsKDpuC",
  authDomain: "binet-e3ac3.firebaseapp.com",
  databaseURL: "https://binet-e3ac3-default-rtdb.firebaseio.com",
  projectId: "binet-e3ac3",
  storageBucket: "binet-e3ac3.firebasestorage.app",
  messagingSenderId: "272460687857",
  appId: "1:272460687857:web:badaa5c917b5192203fc50"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentUser = null;
let currentChat = "general";
let listening = false;

const baseUsers = {
  rich: {
    id: "rich",
    username: "rich",
    password: "1234",
    name: "Richard",
    role: "administrador",
    avatar: "R",
    color: "#6c63ff",
    online: false
  },
  ariana: {
    id: "ariana",
    username: "ariana",
    password: "1234",
    name: "Ariana",
    role: "usuario",
    avatar: "A",
    color: "#22c55e",
    online: false
  }
};

async function seedUsers() {
  const snap = await get(ref(db, "users"));
  if (!snap.exists()) {
    await set(ref(db, "users"), baseUsers);
  } else {
    const data = snap.val() || {};
    const patch = {};
    if (!data.rich) patch["users/rich"] = baseUsers.rich;
    if (!data.ariana) patch["users/ariana"] = baseUsers.ariana;
    if (Object.keys(patch).length) await update(ref(db), patch);
  }
}

function esc(v = "") {
  return String(v)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

function hora(ts) {
  return new Date(ts || Date.now()).toLocaleTimeString("es-CL", {
    hour: "2-digit",
    minute: "2-digit"
  });
}

window.login = async function () {
  const username = document.getElementById("user").value.trim().toLowerCase();
  const password = document.getElementById("pass").value.trim();
  const error = document.getElementById("error");

  error.textContent = "";

  if (!username || !password) {
    error.textContent = "Ingresa usuario y contraseña.";
    return;
  }

  try {
    await seedUsers();

    const snap = await get(ref(db, "users/" + username));

    if (!snap.exists()) {
      error.textContent = "Usuario no existe.";
      return;
    }

    const user = snap.val();

    if (user.password !== password) {
      error.textContent = "Clave incorrecta.";
      return;
    }

    currentUser = user;

    await update(ref(db, "users/" + user.id), {
      online: true,
      lastSeen: Date.now()
    });

    onDisconnect(ref(db, "users/" + user.id + "/online")).set(false);
    onDisconnect(ref(db, "users/" + user.id + "/lastSeen")).set(Date.now());

    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "flex";

    document.getElementById("myName").textContent = user.name;
    document.getElementById("myRole").textContent = user.role;
    document.getElementById("myAvatar").textContent = user.avatar;
    document.getElementById("myAvatar").style.background = user.color;

    listenMessages();
    listenUsers();

  } catch (e) {
    console.error(e);
    error.textContent = "Error conectando con Firebase. Revisa Realtime Database y databaseURL.";
  }
};

window.logout = async function () {
  if (currentUser) {
    await update(ref(db, "users/" + currentUser.id), {
      online: false,
      lastSeen: Date.now()
    });
  }

  currentUser = null;
  location.reload();
};

function listenMessages() {
  if (listening) return;
  listening = true;

  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  onChildAdded(ref(db, "messages/" + currentChat), (snap) => {
    const msg = snap.val();
    if (!msg) return;

    const mine = msg.userId === currentUser.id;

    const div = document.createElement("div");
    div.className = mine ? "msg mine" : "msg other";

    div.innerHTML = `
      <div class="msgHead">
        <strong>${esc(msg.name)}</strong>
        <span>${hora(msg.time)}</span>
      </div>
      <div class="msgText">${esc(msg.text)}</div>
    `;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  });
}

function listenUsers() {
  onValue(ref(db, "users"), (snap) => {
    const users = snap.val() || {};
    const box = document.getElementById("usersBox");
    box.innerHTML = "";

    Object.values(users).forEach(u => {
      const row = document.createElement("div");
      row.className = "userRow";
      row.innerHTML = `
        <div class="miniAvatar" style="background:${u.color}">${esc(u.avatar)}</div>
        <div>
          <strong>${esc(u.name)}</strong>
          <span>${u.online ? "🟢 En línea" : "⚫ Desconectado"} · ${esc(u.role)}</span>
        </div>
      `;
      box.appendChild(row);
    });
  });
}

window.send = async function () {
  const input = document.getElementById("msg");
  const text = input.value.trim();

  if (!text || !currentUser) return;

  await push(ref(db, "messages/" + currentChat), {
    userId: currentUser.id,
    username: currentUser.username,
    name: currentUser.name,
    text,
    time: Date.now()
  });

  input.value = "";
  input.focus();
};

window.addEventListener("DOMContentLoaded", async () => {
  try {
    await seedUsers();
  } catch (e) {
    console.error(e);
  }

  document.getElementById("pass").addEventListener("keydown", e => {
    if (e.key === "Enter") login();
  });

  document.getElementById("msg").addEventListener("keydown", e => {
    if (e.key === "Enter") send();
  });
});
</script>

<style>

  box-sizing: border-box;
}

/* APP CORREGIDA */
#app {
  display: none;
  width: 100%;
  height: 100vh;
  flex-direction: column;
  background: #0c0c0f;
}

.header {
  height: 72px;

  background: #1a1a22;

  display: flex;
  align-items: center;
  justify-content: space-between;

}

.headerLeft h2 {

}

.avatar,

}

}

.logout {

}

  flex: 1;

}

}

<body>

<section id="login">
  <div class="loginBox">
    <div class="logo">B</div>
    <h1>BINET</h1>
    <div class="sub">Chat interno en vivo con Firebase</div>

    <label>USUARIO</label>
    <input id="user" placeholder="rich o ariana" autocomplete="username" />

    <label>CONTRASEÑA</label>
    <input id="pass" type="password" placeholder="1234" autocomplete="current-password" />

    <div id="error"></div>

    <button onclick="login()">Ingresar</button>

    <div class="demo">
      <strong>Usuarios de prueba:</strong><br>
      Administrador: <strong>rich</strong> / clave <strong>1234</strong><br>
      Usuario: <strong>ariana</strong> / clave <strong>1234</strong>
    </div>
  </div>
</section>

<section id="app">
  <header class="header">
    <div class="headerLeft">
      <h2>💬 Chat General</h2>
      <p>Canal en vivo conectado a Firebase</p>
    </div>

    <div class="userChip">
      <div id="myAvatar" class="avatar">R</div>
      <div>
        <strong id="myName">Usuario</strong>
        <span id="myRole">rol</span>
      </div>
      <button class="logout" onclick="logout()">⏻</button>
    </div>
  </header>

  <div class="mainArea">
    <div class="chatArea">
      <div id="chat"></div>

      <div class="sendBox">
        <input id="msg" placeholder="Escribe un mensaje..." autocomplete="off" />
        <button class="sendBtn" onclick="send()">➤</button>
      </div>
    </div>

    <aside class="side">
      <h3>Usuarios</h3>
      <p>Estado de conexión</p>
      <div id="usersBox"></div>

  </div>
</section>

</body>
</html>
