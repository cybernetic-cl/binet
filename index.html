<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BINET Chat</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, set, get, push, update, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB0HVVTUhkswLkLORXLIZwOCoSLKsKDpuC",
  authDomain: "binet-e3ac3.firebaseapp.com",
  databaseURL: "https://binet-e3ac3-default-rtdb.firebaseio.com",
  projectId: "binet-e3ac3",
  storageBucket: "binet-e3ac3.appspot.com",
  messagingSenderId: "272460687857",
  appId: "1:272460687857:web:badaa5c917b5192203fc50"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentUser = null;
let currentChat = "general";

const users = {
  rich: {pass:"1234", name:"Richard", color:"#6c63ff"},
  ariana: {pass:"1234", name:"Ariana", color:"#22c55e"}
};

window.login = async function(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(!users[u] || users[u].pass !== p){
    alert("Usuario incorrecto");
    return;
  }

  currentUser = u;

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="flex";

  listenMessages();
}

function listenMessages(){
  const chatRef = ref(db, "messages/"+currentChat);

  onChildAdded(chatRef, snap=>{
    let msg = snap.val();
    let div = document.createElement("div");

    div.className = msg.user === currentUser ? "mine" : "other";

    div.innerHTML = `
      <b>${msg.user}</b><br>
      ${msg.text}
    `;

    document.getElementById("chat").appendChild(div);
  });
}

window.send = function(){
  let txt = document.getElementById("msg").value;
  if(!txt) return;

  push(ref(db,"messages/"+currentChat),{
    user: currentUser,
    text: txt,
    time: Date.now()
  });

  document.getElementById("msg").value="";
}
</script>

<style>
body{margin:0;font-family:Arial;background:#0c0c0f;color:white}
#login{display:flex;height:100vh;align-items:center;justify-content:center}
.box{background:#1a1a22;padding:30px;border-radius:20px;width:300px}
input{width:100%;margin:10px 0;padding:10px;border-radius:10px;border:none}
button{width:100%;padding:10px;border:none;border-radius:10px;background:#6c63ff;color:white}

#app{display:none;height:100vh}
#chat{flex:1;overflow:auto;padding:10px}
.mine{background:#6c63ff;padding:10px;margin:5px;border-radius:10px;align-self:flex-end}
.other{background:#222;padding:10px;margin:5px;border-radius:10px}
#sendBox{display:flex}
#msg{flex:1;padding:10px}
</style>
</head>

<body>

<div id="login">
  <div class="box">
    <h2>BINET</h2>
    <input id="user" placeholder="usuario">
    <input id="pass" type="password" placeholder="clave">
    <button onclick="login()">Ingresar</button>
    <p>rich / 1234</p>
    <p>ariana / 1234</p>
  </div>
</div>

<div id="app">
  <div id="chat"></div>
  <div id="sendBox">
    <input id="msg">
    <button onclick="send()">➤</button>
  </div>
</div>

</body>
</html>
